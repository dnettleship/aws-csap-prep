<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Practice Exam — SAP-C02</title>
  <link rel="stylesheet" href="../site.css" />
  <style>
    .exam-wrap{max-width:780px;margin:0 auto}
    /* Config screen */
    .config-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:2rem}
    .config-card h2{font-size:1.2rem;font-weight:700;margin-bottom:1.25rem}
    .config-row{display:flex;align-items:center;gap:1rem;margin-bottom:1.25rem;flex-wrap:wrap}
    .config-row label{font-size:.9rem;color:var(--text-muted);min-width:180px}
    .config-row input[type=range]{flex:1;min-width:120px;accent-color:var(--accent)}
    .config-row .range-val{font-weight:700;font-size:1.1rem;color:var(--text);min-width:36px}
    .domain-checks{display:flex;gap:.75rem;flex-wrap:wrap;margin-top:.5rem}
    .domain-checks label{display:flex;align-items:center;gap:.4rem;font-size:.85rem;color:var(--text-muted);cursor:pointer}
    .domain-checks input{accent-color:var(--accent)}
    /* Progress */
    .exam-meta{display:flex;align-items:center;justify-content:space-between;gap:1rem;margin-bottom:1.25rem;flex-wrap:wrap}
    .q-counter{color:var(--muted);font-size:.85rem}
    .progress-bar-wrap{background:var(--surface2);border-radius:999px;height:5px;flex:1;min-width:120px;overflow:hidden}
    .progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),#818cf8);border-radius:999px;transition:width .35s ease;width:0%}
    /* Question card */
    .question-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.75rem}
    .question-card.state-correct{border-color:#22c55e}.question-card.state-incorrect{border-color:#ef4444}
    .question-header{display:flex;align-items:flex-start;gap:.75rem;margin:.75rem 0 1.25rem}
    .question-number{background:var(--surface2);color:var(--muted);font-size:.7rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:.25rem .6rem;border-radius:6px;white-space:nowrap;margin-top:2px;flex-shrink:0}
    .question-text{font-size:.975rem;line-height:1.65}
    .options{display:flex;flex-direction:column;gap:.6rem}
    .option{display:flex;align-items:flex-start;gap:.75rem;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:.75rem 1rem;cursor:pointer;transition:border-color .15s,background .15s;user-select:none}
    .option:hover{border-color:#4f5b7a}
    .option input[type=radio]{accent-color:var(--accent);margin-top:2px;flex-shrink:0;width:16px;height:16px}
    .option-label{font-size:.9rem;line-height:1.55;color:var(--text-muted)}
    .option.show-correct{border-color:#22c55e!important;background:#052e16!important}
    .option.show-wrong{border-color:#ef4444!important;background:#2d0a0a!important}
    .option.show-correct .option-label,.option.show-wrong .option-label{color:var(--text)}
    .result-badge{display:none;font-size:.8rem;margin-top:1.1rem;padding:.65rem .9rem;border-radius:8px;line-height:1.6}
    .result-badge.correct-msg{display:block;background:#052e16;color:#86efac;border:1px solid #166534}
    .result-badge.incorrect-msg{display:block;background:#2d0a0a;color:#fca5a5;border:1px solid #7f1d1d}
    .result-badge a{color:#93c5fd;text-underline-offset:3px}
    /* Actions */
    .exam-actions{display:flex;gap:.75rem;margin-top:1.5rem;justify-content:flex-end}
    .btn-primary{background:linear-gradient(135deg,var(--accent),#818cf8);color:#fff;font-size:.95rem;font-weight:600;padding:.75rem 1.75rem;border:none;border-radius:8px;cursor:pointer;transition:opacity .2s,transform .1s}
    .btn-primary:hover{opacity:.88}.btn-primary:active{transform:scale(.98)}.btn-primary:disabled{opacity:.35;cursor:not-allowed}
    .btn-secondary{background:var(--surface2);color:var(--text);font-size:.9rem;font-weight:600;padding:.7rem 1.5rem;border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:border-color .15s}
    .btn-secondary:hover{border-color:var(--accent)}
    /* Score card */
    #score-card{display:none;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:2.5rem 2rem;text-align:center}
    #score-card h2{font-size:1.4rem;margin-bottom:.5rem}
    .score-number{font-size:3.5rem;font-weight:800;letter-spacing:-.03em;margin:.5rem 0}
    .score-label{color:var(--muted);font-size:.9rem}
    .score-breakdown{display:flex;justify-content:center;gap:2.5rem;margin-top:1.5rem;flex-wrap:wrap}
    .breakdown-item .val{font-size:1.5rem;font-weight:700}
    .breakdown-item .lbl{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:.2rem}
    .pass{color:#4ade80}.marginal{color:#fbbf24}.fail{color:#f87171}
    .correct-val{color:#4ade80}.incorrect-val{color:#f87171}
    .domain-report{margin-top:1.5rem;text-align:left;border-top:1px solid var(--border);padding-top:1.25rem}
    .domain-report h3{font-size:.85rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:.75rem}
    .domain-row{display:flex;align-items:center;gap:.75rem;margin-bottom:.5rem;font-size:.88rem}
    .domain-row .d-label{flex:1;color:var(--text-muted)}
    .domain-row .d-score{font-weight:700;min-width:60px;text-align:right}
    .domain-bar-bg{flex:2;background:var(--surface2);border-radius:999px;height:6px;overflow:hidden}
    .domain-bar{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--accent),#818cf8)}
    .domain-bar.weak{background:linear-gradient(90deg,#ef4444,#f87171)}
    .score-actions{display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap;margin-top:1.5rem}
  </style>
</head>
<body>

  <a href="../index.html" class="nav-logo">SAP-C02 <span class="badge">Pro</span></a>

<div class="page">
  <nav class="breadcrumb"><a href="../index.html">Home</a><span>/</span><span>Practice Exam</span></nav>
  <div class="page-header">
    <div class="domain-tag card-tag tag-cheat">Practice</div>
    <h1>Practice Exam</h1>
    <p class="subtitle" id="examSubtitle">Configure your exam below</p>
  </div>

  <div class="exam-wrap">

    <!-- CONFIG SCREEN -->
    <div id="configScreen" class="config-card">
      <h2>Configure your exam</h2>
      <div class="config-row">
        <label>Number of questions</label>
        <input type="range" id="qCount" min="10" max="30" value="20" step="5">
        <span class="range-val" id="qCountVal">20</span>
      </div>
      <div class="config-row" style="align-items:flex-start">
        <label>Domains (all selected = mixed)</label>
        <div class="domain-checks">
          <label><input type="checkbox" class="domain-cb" value="1" checked> Domain 1 — Org Complexity</label>
          <label><input type="checkbox" class="domain-cb" value="2" checked> Domain 2 — New Solutions</label>
          <label><input type="checkbox" class="domain-cb" value="3" checked> Domain 3 — Continuous Improvement</label>
          <label><input type="checkbox" class="domain-cb" value="4" checked> Domain 4 — Migration</label>
        </div>
      </div>
      <div id="configError" style="color:#f87171;font-size:.85rem;margin-bottom:.75rem;display:none"></div>
      <div class="exam-actions" style="margin-top:1.5rem">
        <button class="btn-primary" id="startBtn">Start Exam &rarr;</button>
      </div>
    </div>

    <!-- EXAM SCREEN -->
    <div id="examScreen" style="display:none">
      <div class="exam-meta">
        <span class="q-counter" id="qCounter">Question 1 of 20</span>
        <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>
      </div>
      <div class="question-card" id="questionCard">
        <span class="domain-tag" id="qDomainTag"></span>
        <div class="question-header"><span class="question-number" id="qNumber"></span><p class="question-text" id="qText"></p></div>
        <div class="options" id="qOptions"></div>
        <div class="result-badge" id="resultBadge"></div>
      </div>
      <div class="exam-actions">
        <button class="btn-secondary" id="skipBtn">Skip</button>
        <button class="btn-primary" id="submitBtn">Submit Answer</button>
        <button class="btn-primary" id="nextBtn" style="display:none">Next &rarr;</button>
        <button class="btn-primary" id="finishBtn" style="display:none">See Results &rarr;</button>
      </div>
    </div>

    <!-- SCORE SCREEN -->
    <div id="score-card">
      <h2>Your Result</h2>
      <div class="score-number" id="scorePercent"></div>
      <div class="score-label" id="scoreLabel"></div>
      <div class="score-breakdown">
        <div class="breakdown-item"><div class="val correct-val" id="countCorrect">0</div><div class="lbl">Correct</div></div>
        <div class="breakdown-item"><div class="val incorrect-val" id="countIncorrect">0</div><div class="lbl">Incorrect</div></div>
        <div class="breakdown-item"><div class="val" id="countSkipped">0</div><div class="lbl">Skipped</div></div>
      </div>
      <div class="domain-report"><h3>Domain Breakdown</h3><div id="domainBreakdown"></div></div>
      <div class="score-actions">
        <button class="btn-primary" id="downloadBtn">&#11015; Download Report</button>
        <button class="btn-secondary" id="newExamBtn">New Exam</button>
      </div>
    </div>

  </div>
</div>

<script src="questions.js"></script>
<script>
const DOMAIN_NAMES = {1:"Org Complexity",2:"New Solutions",3:"Continuous Improvement",4:"Migration"};
const DOMAIN_LABELS = {
  1:{label:"Domain 1 — Org Complexity",cls:"tag-d1"},
  2:{label:"Domain 2 — New Solutions",cls:"tag-d2"},
  3:{label:"Domain 3 — Continuous Improvement",cls:"tag-d3"},
  4:{label:"Domain 4 — Migration",cls:"tag-d4"}
};

let examQuestions = [], current = 0, questionResults = [];

/* ── range input live update ── */
const qCountEl = document.getElementById('qCount');
const qCountVal = document.getElementById('qCountVal');
qCountEl.addEventListener('input', () => { qCountVal.textContent = qCountEl.value; });

/* ── start exam ── */
document.getElementById('startBtn').addEventListener('click', () => {
  const n = parseInt(qCountEl.value);
  const selected = [...document.querySelectorAll('.domain-cb:checked')].map(c => parseInt(c.value));
  const errEl = document.getElementById('configError');
  if (selected.length === 0) { errEl.textContent = 'Select at least one domain.'; errEl.style.display='block'; return; }
  errEl.style.display = 'none';

  const pool = window.QUESTION_BANK.filter(q => selected.includes(q.domain));
  if (pool.length < n) {
    errEl.textContent = `Only ${pool.length} questions available for selected domains. Reduce question count or select more domains.`;
    errEl.style.display = 'block'; return;
  }

  examQuestions = shuffle(pool).slice(0, n);
  current = 0; questionResults = [];

  document.getElementById('examSubtitle').textContent = `${n} questions · ${selected.map(d=>DOMAIN_NAMES[d]).join(', ')}`;
  document.getElementById('configScreen').style.display = 'none';
  document.getElementById('examScreen').style.display = 'block';
  renderQuestion(0);
});

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* ── render ── */
function renderQuestion(idx) {
  const q = examQuestions[idx], d = DOMAIN_LABELS[q.domain];
  const card = document.getElementById('questionCard');
  card.className = 'question-card';
  document.getElementById('qDomainTag').textContent = d.label;
  document.getElementById('qDomainTag').className = 'domain-tag card-tag ' + d.cls;
  document.getElementById('qNumber').textContent = 'Q' + (idx + 1);
  document.getElementById('qText').innerHTML = q.text;
  document.getElementById('qCounter').textContent = `Question ${idx + 1} of ${examQuestions.length}`;
  document.getElementById('progressBar').style.width = (idx / examQuestions.length * 100) + '%';
  const badge = document.getElementById('resultBadge');
  badge.className = 'result-badge'; badge.innerHTML = '';
  const opts = document.getElementById('qOptions');
  opts.innerHTML = '';
  Object.entries(q.options).forEach(([val, text]) => {
    const label = document.createElement('label');
    label.className = 'option';
    label.innerHTML = `<input type="radio" name="answer" value="${val}"/><span class="option-label"><strong>${val}.</strong> ${text}</span>`;
    opts.appendChild(label);
  });
  document.getElementById('submitBtn').style.display = 'inline-block';
  document.getElementById('submitBtn').disabled = false;
  document.getElementById('skipBtn').style.display = 'inline-block';
  document.getElementById('nextBtn').style.display = 'none';
  document.getElementById('finishBtn').style.display = 'none';
  document.querySelector('.exam-wrap').scrollIntoView({behavior:'smooth',block:'start'});
}

/* ── submit ── */
document.getElementById('submitBtn').addEventListener('click', () => showFeedback(false));
document.getElementById('skipBtn').addEventListener('click', () => showFeedback(true));

function showFeedback(skipped) {
  const selected = document.querySelector('input[name="answer"]:checked');
  const q = examQuestions[current];
  document.querySelectorAll('input[name="answer"]').forEach(r => r.disabled = true);
  document.querySelectorAll('input[name="answer"]').forEach(r => {
    if (r.value === q.correct) r.closest('.option').classList.add('show-correct');
  });
  const badge = document.getElementById('resultBadge');
  const card = document.getElementById('questionCard');
  let outcome;
  if (skipped || !selected) {
    outcome = 'skipped';
    card.classList.add('state-incorrect');
    badge.className = 'result-badge incorrect-msg';
    badge.innerHTML = `&#9888; Skipped. Correct: <strong>${q.correct}</strong>. ${q.explanation} <a href="${q.link}" target="_blank">Review &rarr;</a>`;
  } else if (selected.value === q.correct) {
    outcome = 'correct';
    card.classList.add('state-correct');
    badge.className = 'result-badge correct-msg';
    badge.innerHTML = `&#10003; Correct! ${q.explanation}`;
  } else {
    outcome = 'incorrect';
    card.classList.add('state-incorrect');
    selected.closest('.option').classList.add('show-wrong');
    badge.className = 'result-badge incorrect-msg';
    badge.innerHTML = `&#10007; You chose <strong>${selected ? selected.value : '—'}</strong>; correct: <strong>${q.correct}</strong>. ${q.explanation} <a href="${q.link}" target="_blank">Review &rarr;</a>`;
  }
  questionResults.push({q: q.id, domain: q.domain, topic: q.topic, text: q.text, options: q.options, correct: q.correct, chosen: selected ? selected.value : null, outcome, explanation: q.explanation, link: q.link});
  document.getElementById('submitBtn').style.display = 'none';
  document.getElementById('skipBtn').style.display = 'none';
  if (current < examQuestions.length - 1) document.getElementById('nextBtn').style.display = 'inline-block';
  else document.getElementById('finishBtn').style.display = 'inline-block';
}

document.getElementById('nextBtn').addEventListener('click', () => { current++; renderQuestion(current); });
document.getElementById('finishBtn').addEventListener('click', () => {
  document.getElementById('examScreen').style.display = 'none';
  showScore();
});

/* ── score ── */
function showScore() {
  const correct = questionResults.filter(r => r.outcome === 'correct').length;
  const incorrect = questionResults.filter(r => r.outcome === 'incorrect').length;
  const skipped = questionResults.filter(r => r.outcome === 'skipped').length;
  const pct = Math.round(correct / examQuestions.length * 100);

  document.getElementById('countCorrect').textContent = correct;
  document.getElementById('countIncorrect').textContent = incorrect;
  document.getElementById('countSkipped').textContent = skipped;

  const scoreEl = document.getElementById('scorePercent'), labelEl = document.getElementById('scoreLabel');
  scoreEl.textContent = pct + '%';
  if (pct >= 75) { scoreEl.className = 'score-number pass'; labelEl.textContent = 'Pass — great work!'; }
  else if (pct >= 60) { scoreEl.className = 'score-number marginal'; labelEl.textContent = 'Close — review weak domains.'; }
  else { scoreEl.className = 'score-number fail'; labelEl.textContent = 'Keep studying.'; }

  const domainStats = {};
  [1,2,3,4].forEach(d => { domainStats[d] = {correct:0, total:0}; });
  questionResults.forEach(r => { domainStats[r.domain].total++; if (r.outcome === 'correct') domainStats[r.domain].correct++; });

  const bEl = document.getElementById('domainBreakdown'); bEl.innerHTML = '';
  [1,2,3,4].forEach(d => {
    const s = domainStats[d]; if (!s.total) return;
    const p = Math.round(s.correct / s.total * 100), weak = p < 60;
    const row = document.createElement('div'); row.className = 'domain-row';
    row.innerHTML = `<span class="d-label">${DOMAIN_NAMES[d]}</span><div class="domain-bar-bg"><div class="domain-bar${weak?' weak':''}" style="width:${p}%"></div></div><span class="d-score" style="color:${weak?'#f87171':'#4ade80'}">${s.correct}/${s.total} (${p}%)</span>`;
    bEl.appendChild(row);
  });

  document.getElementById('progressBar').style.width = '100%';
  document.getElementById('score-card').style.display = 'block';
  document.getElementById('score-card').scrollIntoView({behavior:'smooth',block:'start'});

  /* auto-save to localStorage */
  try {
    const key = 'sap-exam-' + new Date().toISOString().replace(/[:.]/g,'-');
    const domainStatsFull = {};
    [1,2,3,4].forEach(d => { domainStatsFull[d] = {name:DOMAIN_NAMES[d], correct:domainStats[d].correct, total:domainStats[d].total, weakQuestions:[]}; });
    questionResults.forEach(r => { if (r.outcome !== 'correct') domainStatsFull[r.domain].weakQuestions.push(r.q); });
    const weakAreas = Object.entries(domainStatsFull).filter(([,s]) => s.total > 0 && Math.round(s.correct/s.total*100) < 60).map(([,s]) => s.name);
    localStorage.setItem('sap-last-exam', JSON.stringify({score:pct, date:new Date().toISOString().split('T')[0], n:examQuestions.length, domains:domainStatsFull, weakAreas}));
  } catch(e) {}
}

/* ── download HTML report ── */
document.getElementById('downloadBtn').addEventListener('click', generateReport);

function generateReport() {
  const correct = questionResults.filter(r => r.outcome === 'correct').length;
  const pct = Math.round(correct / examQuestions.length * 100);
  const date = new Date().toISOString().split('T')[0];
  const passColor = pct >= 75 ? '#4ade80' : pct >= 60 ? '#fbbf24' : '#f87171';

  const qRows = questionResults.map((r, i) => {
    const optRows = Object.entries(r.options).map(([k, v]) => {
      let bg = '';
      if (k === r.correct) bg = 'background:#052e16;border-color:#22c55e;';
      else if (k === r.chosen && k !== r.correct) bg = 'background:#2d0a0a;border-color:#ef4444;';
      const chosenMark = k === r.chosen ? (k === r.correct ? ' ✓' : ' ✗') : '';
      return `<div style="padding:.5rem .75rem;border:1px solid #334155;border-radius:6px;margin:.3rem 0;font-size:.85rem;${bg}"><strong>${k}${chosenMark}.</strong> ${v}</div>`;
    }).join('');
    const outcomeColor = r.outcome === 'correct' ? '#4ade80' : '#f87171';
    const outcomeLabel = r.outcome === 'correct' ? '✓ Correct' : r.outcome === 'skipped' ? '— Skipped' : '✗ Incorrect';
    return `
    <div style="background:#1e293b;border:1px solid #334155;border-radius:10px;padding:1.25rem;margin-bottom:1rem">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.75rem;gap:.75rem;flex-wrap:wrap">
        <span style="font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#64748b">Q${i+1} · ${r.topic}</span>
        <span style="font-size:.78rem;font-weight:700;color:${outcomeColor}">${outcomeLabel}</span>
      </div>
      <p style="font-size:.92rem;line-height:1.6;margin:0 0 .9rem">${r.text}</p>
      ${optRows}
      <div style="margin-top:.75rem;padding:.6rem .8rem;background:#0f172a;border-radius:6px;font-size:.82rem;line-height:1.6;color:#94a3b8">
        ${r.explanation}
      </div>
    </div>`;
  }).join('');

  const domainRows = (() => {
    const stats = {};
    [1,2,3,4].forEach(d => { stats[d] = {correct:0,total:0}; });
    questionResults.forEach(r => { stats[r.domain].total++; if (r.outcome === 'correct') stats[r.domain].correct++; });
    return [1,2,3,4].filter(d => stats[d].total > 0).map(d => {
      const p = Math.round(stats[d].correct / stats[d].total * 100);
      const col = p >= 60 ? '#4ade80' : '#f87171';
      return `<div style="display:flex;gap:.75rem;align-items:center;margin-bottom:.4rem;font-size:.85rem">
        <span style="flex:1;color:#94a3b8">${DOMAIN_NAMES[d]}</span>
        <div style="flex:2;background:#0f172a;border-radius:999px;height:6px;overflow:hidden"><div style="height:100%;width:${p}%;background:${col};border-radius:999px"></div></div>
        <span style="font-weight:700;color:${col};min-width:70px;text-align:right">${stats[d].correct}/${stats[d].total} (${p}%)</span>
      </div>`;
    }).join('');
  })();

  const html = `<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SAP-C02 Exam Report — ${date}</title>
<style>*{box-sizing:border-box;margin:0;padding:0}body{background:#0f172a;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:2rem 1rem}a{color:#93c5fd}.wrap{max-width:820px;margin:0 auto}</style>
</head><body><div class="wrap">
<div style="text-align:center;padding:2rem 0 1.5rem">
  <div style="font-size:3rem;font-weight:800;color:${passColor}">${pct}%</div>
  <div style="color:#64748b;margin-top:.25rem">${correct} / ${examQuestions.length} correct &bull; ${date}</div>
</div>
<div style="background:#1e293b;border:1px solid #334155;border-radius:10px;padding:1.25rem;margin-bottom:1.5rem">
  <div style="font-size:.75rem;text-transform:uppercase;letter-spacing:.05em;color:#64748b;margin-bottom:.75rem">Domain Breakdown</div>
  ${domainRows}
</div>
<div>${qRows}</div>
<div style="text-align:center;color:#334155;font-size:.75rem;margin-top:2rem">SAP-C02 Practice Exam Report</div>
</div></body></html>`;

  const blob = new Blob([html], {type:'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `sap-c02-exam-report-${date}.html`;
  a.click();
}

/* ── new exam ── */
document.getElementById('newExamBtn').addEventListener('click', () => {
  document.getElementById('score-card').style.display = 'none';
