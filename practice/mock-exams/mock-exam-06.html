    .exam-wrap{max-width:760px;margin:0 auto}.exam-meta{display:flex;align-items:center;justify-content:space-between;gap:1rem;margin-bottom:1.25rem;flex-wrap:wrap}.q-counter{color:var(--muted);font-size:.85rem}.progress-bar-wrap{background:var(--surface2);border-radius:999px;height:5px;flex:1;min-width:120px;overflow:hidden}.progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),#818cf8);border-radius:999px;transition:width .35s ease;width:0%}.question-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.75rem}.question-card.state-correct{border-color:#22c55e}.question-card.state-incorrect{border-color:#ef4444}.question-header{display:flex;align-items:flex-start;gap:.75rem;margin:.75rem 0 1.25rem}.question-number{background:var(--surface2);color:var(--muted);font-size:.7rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:.25rem .6rem;border-radius:6px;white-space:nowrap;margin-top:2px;flex-shrink:0}.question-text{font-size:.975rem;line-height:1.65}.options{display:flex;flex-direction:column;gap:.6rem}.option{display:flex;align-items:flex-start;gap:.75rem;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:.75rem 1rem;cursor:pointer;transition:border-color .15s,background .15s;user-select:none}.option:hover{border-color:#4f5b7a}.option input[type=radio]{accent-color:var(--accent);margin-top:2px;flex-shrink:0;width:16px;height:16px}.option-label{font-size:.9rem;line-height:1.55;color:var(--text-muted)}.option.show-correct{border-color:#22c55e!important;background:#052e16!important}.option.show-wrong{border-color:#ef4444!important;background:#2d0a0a!important}.option.show-correct .option-label,.option.show-wrong .option-label{color:var(--text)}.result-badge{display:none;font-size:.8rem;margin-top:1.1rem;padding:.65rem .9rem;border-radius:8px;line-height:1.6}.result-badge.correct-msg{display:block;background:#052e16;color:#86efac;border:1px solid #166534}.result-badge.incorrect-msg{display:block;background:#2d0a0a;color:#fca5a5;border:1px solid #7f1d1d}.result-badge a{color:#93c5fd;text-underline-offset:3px}.exam-actions{display:flex;gap:.75rem;margin-top:1.5rem;justify-content:flex-end}.btn-primary{background:linear-gradient(135deg,var(--accent),#818cf8);color:#fff;font-size:.95rem;font-weight:600;padding:.75rem 1.75rem;border:none;border-radius:8px;cursor:pointer;transition:opacity .2s,transform .1s}.btn-primary:hover{opacity:.88}.btn-primary:active{transform:scale(.98)}.btn-primary:disabled{opacity:.35;cursor:not-allowed}#score-card{display:none;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:2.5rem 2rem;text-align:center}#score-card h2{font-size:1.4rem;margin-bottom:.5rem}.score-number{font-size:3.5rem;font-weight:800;letter-spacing:-.03em;margin:.5rem 0}.score-label{color:var(--muted);font-size:.9rem}.score-breakdown{display:flex;justify-content:center;gap:2.5rem;margin-top:1.5rem;flex-wrap:wrap}.breakdown-item .val{font-size:1.5rem;font-weight:700}.breakdown-item .lbl{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:.2rem}.pass{color:#4ade80}.marginal{color:#fbbf24}.fail{color:#f87171}.correct-val{color:#4ade80}.incorrect-val{color:#f87171}.domain-report{margin-top:1.5rem;text-align:left;border-top:1px solid var(--border);padding-top:1.25rem}.domain-report h3{font-size:.85rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:.75rem}.domain-row{display:flex;align-items:center;gap:.75rem;margin-bottom:.5rem;font-size:.88rem}.domain-row .d-label{flex:1;color:var(--text-muted)}.domain-row .d-score{font-weight:700;min-width:60px;text-align:right}.domain-bar-bg{flex:2;background:var(--surface2);border-radius:999px;height:6px;overflow:hidden}.domain-bar{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--accent),#818cf8)}.domain-bar.weak{background:linear-gradient(90deg,#ef4444,#f87171)}.download-btn{margin-top:1.25rem;display:inline-block;background:var(--surface2);color:var(--text);font-size:.85rem;font-weight:600;padding:.55rem 1.25rem;border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:border-color .15s}.download-btn:hover{border-color:var(--accent)}.btn-restart{margin-top:.75rem;display:inline-block;background:var(--surface2);color:var(--text);font-size:.9rem;font-weight:600;padding:.65rem 1.5rem;border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:border-color .15s}.btn-restart:hover{border-color:var(--accent)}

    <h1>Mock Exam 6</h1>
    <p class="subtitle">10 questions &bull; Targeted practice &mdash; Migration &amp; New Solutions focus</p>
  </div>
  <div class="exam-wrap">
    <div class="exam-meta"><span class="q-counter" id="qCounter">Question 1 of 10</span><div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div></div>
    <div class="question-card" id="questionCard">
      <span class="domain-tag" id="qDomainTag"></span>
      <div class="question-header"><span class="question-number" id="qNumber"></span><p class="question-text" id="qText"></p></div>
      <div class="options" id="qOptions"></div>

    </div>
    <div class="exam-actions">
      <button class="btn-primary" id="submitBtn">Submit Answer</button>

      <h2>Your Result</h2><div class="score-number" id="scorePercent"></div><div class="score-label" id="scoreLabel"></div>

        <div class="breakdown-item"><div class="val incorrect-val" id="countIncorrect">0</div><div class="lbl">Incorrect</div></div>
        <div class="breakdown-item"><div class="val" id="countUnanswered">0</div><div class="lbl">Skipped</div></div>
      </div>

<script>
const EXAM_NAME="Mock Exam 6";
const QUESTIONS=[
  {id:"q1",domain:4,text:"A company needs to migrate 2 PB of cold archive data from an on-premises NAS to Amazon S3, then transition the objects to S3 Glacier via lifecycle rules. The on-premises data centre has a 1 Gbps internet connection shared with production. The migration must complete within 2 weeks. Which approach is most appropriate?",options:{A:"Use AWS DataSync with a DataSync agent on-premises, transferring over the shared internet connection.",B:"Order multiple AWS Snowball Edge Storage Optimized devices (80 TB usable each), load the data offline, and ship them to AWS for import into S3.",C:"Enable S3 Transfer Acceleration and upload directly from the NAS over the internet.",D:"Provision a temporary 10 Gbps Direct Connect connection for the migration period."}},
  {id:"q2",domain:4,text:"A company has a legacy CRM application running on Windows Server 2008 on-premises. The vendor no longer supports the application and it cannot be modified. The company wants to move it to AWS to benefit from managed infrastructure but has no budget for a rewrite. What is the most appropriate migration strategy?",options:{A:"Refactor — redesign the application as cloud-native microservices on AWS Lambda.",B:"Replatform — migrate the database to RDS and keep the application code unchanged on EC2.",C:"Rehost (lift-and-shift) — use AWS MGN to replicate the server to EC2 as-is, without modification.",D:"Repurchase — replace the CRM with a SaaS product such as Salesforce."}},
  {id:"q3",domain:4,text:"A company is migrating a 5 TB MySQL database from on-premises to Amazon Aurora MySQL. They need continuous replication with under 5 minutes of data lag during migration and a cutover window under 30 minutes. How should they configure AWS DMS?",options:{A:"DMS full load only — run during a maintenance window and accept several hours of downtime.",B:"DMS full load followed by Change Data Capture (CDC) replication — migrate bulk data first, then replicate ongoing changes until in sync, then cut over with minimal lag.",C:"AWS DataSync with a MySQL agent to synchronise binary log files to Aurora.",D:"AWS MGN to replicate the MySQL server, then promote Aurora as the new primary."}},
  {id:"q4",domain:4,text:"A company has a monolithic .NET application deployed on Windows IIS on-premises. They want to modernize by gradually extracting microservices without a big-bang rewrite. The first step is containerising the existing monolith to enable iterative extraction. Which approach should they follow?",options:{A:"Use AWS MGN to lift the IIS server to EC2, then manually write Dockerfiles for each service.",B:"Use AWS App2Container to containerise the existing .NET IIS application, deploy to ECS or EKS, then apply the Strangler Fig pattern to incrementally extract services over time.",C:"Rewrite the entire application in Node.js and deploy to Lambda.",D:"Deploy to AWS Elastic Beanstalk using the .NET platform, then refactor services one by one."}},
  {id:"q5",domain:2,text:"A Lambda function processes real-time payment authorisations and must always respond within 100 ms. Occasional batch processing spikes from a separate Lambda function cause throttling of the payment function due to account-level concurrency exhaustion. What should the architect configure?",options:{A:"Increase the payment Lambda function timeout to 15 minutes to wait out the congestion.",B:"Set Reserved Concurrency on the batch Lambda to cap its concurrency pool usage, and enable Provisioned Concurrency on the payment Lambda to pre-warm execution environments and eliminate cold starts.",C:"Place an SQS queue in front of the payment Lambda to buffer and smooth incoming traffic.",D:"Deploy the payment Lambda to multiple regions and use Route 53 latency-based routing to distribute load."}},
  {id:"q6",domain:2,text:"A company is building a mobile app that allows users to sign in with their Google credentials. After sign-in, users need temporary AWS credentials to read objects directly from S3. Which combination of Cognito features is required?",options:{A:"Cognito User Pool only — it provides both authentication and AWS credentials.",B:"Cognito User Pool (to handle Google federation and issue JWT tokens) combined with a Cognito Identity Pool (to exchange the User Pool JWT for short-lived AWS credentials via STS).",C:"Cognito Identity Pool only — configure Google as a direct identity provider in the Identity Pool.",D:"IAM SAML 2.0 federation with Google as the SAML identity provider."}},
  {id:"q7",domain:2,text:"A company runs a multi-step order processing workflow: validate order → charge payment → update inventory → send confirmation email. Each step is a separate Lambda function. If the payment step fails, the inventory and email steps must not execute and the order must be marked as failed. What is the recommended orchestration approach?",options:{A:"Chain the Lambda functions using SNS, where each Lambda publishes to a topic that triggers the next function.",B:"Use AWS Step Functions Standard Workflow — define a state machine with sequential states and Catch error handlers to route to a failure state if any step throws an error.",C:"Use SQS queues between each Lambda with dead-letter queues to capture failures at each stage.",D:"Use Amazon EventBridge Pipes to connect the Lambda functions sequentially with built-in error routing."}},
  {id:"q8",domain:1,text:"A company is deploying AWS Control Tower across its organisation. The security team requires that S3 Block Public Access must be enforced in all enrolled accounts and must not be reversible by account administrators. Which type of Control Tower guardrail achieves this?",options:{A:"Detective guardrail — uses an AWS Config rule to detect and alert when S3 public access settings are changed.",B:"Proactive guardrail — uses AWS CloudFormation hooks to block non-compliant resource provisioning.",C:"Preventive guardrail (SCP-based) — denies API calls that would disable S3 Block Public Access, applied to all OUs in the landing zone and not overridable by account admins.",D:"AWS Config organizational rule with an auto-remediation Lambda that re-enables Block Public Access."}},
  {id:"q9",domain:1,text:"A company wants to share a Transit Gateway and VPC subnets from a central networking account with all 50 spoke accounts in the same AWS Organization. New accounts joining the organisation should receive access automatically without any manual steps. What is the most operationally efficient approach?",options:{A:"Grant each spoke account cross-account IAM roles in the networking account and share resource ARNs manually.",B:"Use AWS Resource Access Manager (RAM) — create a resource share containing the TGW and subnets, and share it with the entire AWS Organization. New member accounts inherit access automatically.",C:"Create VPC peering connections from the central account to each spoke account individually.",D:"Use AWS PrivateLink to expose the Transit Gateway as a service endpoint in each spoke account."}},
  {id:"q10",domain:3,text:"A company has multiple teams sharing AWS accounts and finance wants monthly cost reports broken down by team and project. Teams should be able to view their own costs in Cost Explorer without seeing other teams' data. Which combination achieves this with the least operational overhead?",options:{A:"Create separate AWS accounts per team and use consolidated billing in AWS Organizations.",B:"Enable Cost Allocation Tags (e.g., Team and Project), activate them in the Billing and Cost Management console, use Cost Explorer tag filters and grouping to segment costs, and grant teams IAM read access to Cost Explorer scoped to their tag values.",C:"Use AWS Budgets to create per-team budget alerts and share the alerts with team leads.",D:"Use AWS Trusted Advisor cost optimisation checks to generate per-team spend reports."}}
];
const ANSWERS={
  q1:{correct:"B",explanation:"2 PB / 80 TB per Snowball Edge = ~25 devices. Physical transfer is far faster than a 1 Gbps shared internet link (which at 100% utilisation would take ~18 days and impact production). DataSync over shared internet (A) would be slow and disruptive. Transfer Acceleration (C) reduces latency but cannot increase bulk throughput at this scale. Direct Connect provisioning (D) takes weeks to arrange.",link:"../../domains/04-cost-performance/index.html"},
  q2:{correct:"C",explanation:"Rehost (lift-and-shift) with MGN is correct when the application cannot be modified and no rewrite budget exists — it moves the server to EC2 as-is. Refactor (A) requires a full rewrite. Replatform (B) still requires the application to run correctly on a modified infrastructure, which may not be possible with an unsupported binary. Repurchase (D) may not preserve custom functionality.",link:"../../domains/03-migration-modernization/index.html"},
  q3:{correct:"B",explanation:"DMS full load + CDC is the standard pattern for near-zero downtime database migrations. Full load migrates existing rows; CDC captures ongoing changes, keeping the target in sync until you're ready to cut over. Full load only (A) requires extended downtime proportional to database size. DataSync (C) transfers files, not database CDC streams. MGN (D) is for server-level replication, not database-level migration.",link:"../../domains/03-migration-modernization/index.html"},
  q4:{correct:"B",explanation:"App2Container automatically containerises existing .NET and Java applications running on Windows or Linux without code changes, producing Docker images ready for ECS or EKS. Deploying the containerised monolith then sets the foundation for Strangler Fig extraction. MGN (A) replicates servers at the block level — not container images. A full rewrite (C) is high risk. Elastic Beanstalk (D) doesn't containerise or modernise the application.",link:"../../domains/03-migration-modernization/index.html"},
  q5:{correct:"B",explanation:"Reserved Concurrency on the batch Lambda limits how many concurrent executions it can consume from the account pool, protecting the payment function. Provisioned Concurrency pre-initialises execution environments, eliminating the cold-start delay that would otherwise push latency above 100 ms. Increasing timeout (A) doesn't prevent throttling. An SQS buffer (C) adds queuing latency, violating the <100 ms requirement. Multi-region routing (D) doesn't solve within-region account concurrency exhaustion.",link:"../../services/compute/lambda.html"},
  q6:{correct:"B",explanation:"Cognito User Pools handle federated authentication with social IdPs (Google, Facebook, Apple) and issue JWT tokens. Cognito Identity Pools exchange those JWT tokens for temporary AWS credentials via STS AssumeRoleWithWebIdentity, scoped to an IAM role. User Pool alone (A) does not issue AWS credentials. Identity Pool only with direct Google federation (C) works but bypasses User Pool features like MFA and user management. IAM SAML (D) is for enterprise workforce SSO, not consumer social login.",link:"../../domains/02-new-solutions/index.html"},
  q7:{correct:"B",explanation:"Step Functions Standard Workflows provide native sequential state execution with Catch/Retry error handling — if the payment step fails, a Catch block routes to a failure state before inventory or email states execute. SNS chaining (A) has no error propagation between functions. SQS DLQs (C) capture individual failures but don't coordinate multi-step sequencing or prevent downstream steps from running. EventBridge Pipes (D) are for point-to-point event transformation, not multi-step workflow orchestration with conditional error routing.",link:"../../domains/02-new-solutions/index.html"},
  q8:{correct:"C",explanation:"Control Tower preventive guardrails are implemented as SCPs applied to all OUs in the landing zone. They proactively deny non-compliant API calls and cannot be overridden by account administrators or root users within member accounts. Detective guardrails (A) only detect and alert — they cannot prevent the action. Proactive guardrails (B) block CloudFormation deployments but don't cover direct API calls. Config auto-remediation (D) is reactive — the disallowed action succeeds before remediation fires.",link:"../../domains/01-organizational-complexity/index.html"},
  q9:{correct:"B",explanation:"AWS RAM enables sharing resources with an entire AWS Organization or specific OUs. New accounts joining the Organisation automatically inherit the resource share — no manual steps required. Per-account IAM roles (A) must be configured for every new account. VPC peering (C) is non-transitive, requires individual connections, and doesn't scale. PrivateLink (D) exposes service endpoints, not Transit Gateways.",link:"../../services/networking/transit-gateway.html"},
  q10:{correct:"B",explanation:"Cost Allocation Tags, once activated in the Billing and Cost Management console, appear as filterable dimensions in Cost Explorer. Teams can filter by their own tag values to see only their costs. IAM policies can restrict Cost Explorer access by tag condition. Separate accounts (A) achieve isolation but add significant operational overhead and don't allow shared-account workflows. Budgets (C) provide threshold alerts, not detailed cost breakdown by tag. Trusted Advisor (D) provides recommendations, not per-team cost reporting.",link:"../../domains/03-migration-modernization/index.html"}
};
const DOMAIN_NAMES={1:"Org Complexity",2:"New Solutions",3:"Continuous Improvement",4:"Migration"};
const DOMAIN_LABELS={1:{label:"Domain 1 \u2014 Org Complexity",cls:"tag-d1"},2:{label:"Domain 2 \u2014 New Solutions",cls:"tag-d2"},3:{label:"Domain 3 \u2014 Continuous Improvement",cls:"tag-d3"},4:{label:"Domain 4 \u2014 Migration",cls:"tag-d4"}};
let current=0,results=[],questionResults=[];
const qCounter=document.getElementById("qCounter"),progressBar=document.getElementById("progressBar"),card=document.getElementById("questionCard"),domainTag=document.getElementById("qDomainTag"),qNumber=document.getElementById("qNumber"),qText=document.getElementById("qText"),qOptions=document.getElementById("qOptions"),resultBadge=document.getElementById("resultBadge"),submitBtn=document.getElementById("submitBtn"),nextBtn=document.getElementById("nextBtn"),finishBtn=document.getElementById("finishBtn"),scoreCard=document.getElementById("score-card");
function renderQuestion(idx){const q=QUESTIONS[idx],d=DOMAIN_LABELS[q.domain];card.className="question-card";domainTag.textContent=d.label;domainTag.className="domain-tag card-tag "+d.cls;qNumber.textContent="Q"+(idx+1);qText.innerHTML=q.text;qCounter.textContent="Question "+(idx+1)+" of "+QUESTIONS.length;progressBar.style.width=(idx/QUESTIONS.length*100)+"%";resultBadge.className="result-badge";resultBadge.innerHTML="";qOptions.innerHTML="";Object.entries(q.options).forEach(([val,text])=>{const label=document.createElement("label");label.className="option";label.innerHTML=`<input type="radio" name="answer" value="${val}"/><span class="option-label"><strong>${val}.</strong> ${text}</span>`;qOptions.appendChild(label);});submitBtn.style.display="inline-block";submitBtn.disabled=false;nextBtn.style.display="none";finishBtn.style.display="none";document.querySelector(".exam-wrap").scrollIntoView({behavior:"smooth",block:"start"});}
function showFeedback(){const selected=document.querySelector('input[name="answer"]:checked');const q=QUESTIONS[current],data=ANSWERS[q.id];document.querySelectorAll('input[name="answer"]').forEach(r=>r.disabled=true);document.querySelectorAll('input[name="answer"]').forEach(radio=>{if(radio.value===data.correct)radio.closest(".option").classList.add("show-correct");});let outcome;if(!selected){outcome="skipped";card.classList.add("state-incorrect");resultBadge.className="result-badge incorrect-msg";resultBadge.innerHTML=`&#9888; Skipped. Correct: <strong>${data.correct}</strong>. ${data.explanation} <a href="${data.link}">Review &rarr;</a>`;}else if(selected.value===data.correct){outcome="correct";card.classList.add("state-correct");resultBadge.className="result-badge correct-msg";resultBadge.innerHTML=`&#10003; Correct! ${data.explanation}`;}else{outcome="incorrect";card.classList.add("state-incorrect");selected.closest(".option").classList.add("show-wrong");resultBadge.className="result-badge incorrect-msg";resultBadge.innerHTML=`&#10007; You chose <strong>${selected.value}</strong>; correct: <strong>${data.correct}</strong>. ${data.explanation} <a href="${data.link}">Review &rarr;</a>`;}results.push(outcome);questionResults.push({q:q.id,domain:q.domain,outcome,chosen:selected?selected.value:null,correct:data.correct});submitBtn.style.display="none";if(current<QUESTIONS.length-1)nextBtn.style.display="inline-block";else finishBtn.style.display="inline-block";}
function showScore(){const correct=results.filter(r=>r==="correct").length,incorrect=results.filter(r=>r==="incorrect").length,skipped=results.filter(r=>r==="skipped").length,pct=Math.round(correct/QUESTIONS.length*100);document.getElementById("countCorrect").textContent=correct;document.getElementById("countIncorrect").textContent=incorrect;document.getElementById("countUnanswered").textContent=skipped;const scoreEl=document.getElementById("scorePercent"),labelEl=document.getElementById("scoreLabel");scoreEl.textContent=pct+"%";if(pct>=75){scoreEl.className="score-number pass";labelEl.textContent="Pass — great work!";}else if(pct>=60){scoreEl.className="score-number marginal";labelEl.textContent="Close — review the weak domains below.";}else{scoreEl.className="score-number fail";labelEl.textContent="Keep studying — focus on the domains highlighted below.";}const domainStats={};[1,2,3,4].forEach(d=>{domainStats[d]={correct:0,total:0};});questionResults.forEach(r=>{domainStats[r.domain].total++;if(r.outcome==="correct")domainStats[r.domain].correct++;});const breakdownEl=document.getElementById("domainBreakdown");breakdownEl.innerHTML="";[1,2,3,4].forEach(d=>{const s=domainStats[d];if(!s.total)return;const pctD=Math.round(s.correct/s.total*100),weak=pctD<60;const row=document.createElement("div");row.className="domain-row";row.innerHTML=`<span class="d-label">${DOMAIN_NAMES[d]}</span><div class="domain-bar-bg"><div class="domain-bar${weak?" weak":""}" style="width:${pctD}%"></div></div><span class="d-score" style="color:${weak?"#f87171":"#4ade80"}">${s.correct}/${s.total} (${pctD}%)</span>`;breakdownEl.appendChild(row);});progressBar.style.width="100%";scoreCard.style.display="block";scoreCard.scrollIntoView({behavior:"smooth",block:"start"});}
function buildReport(){const domainStats={};[1,2,3,4].forEach(d=>{domainStats[d]={name:DOMAIN_NAMES[d],correct:0,total:0,weakQuestions:[]};});questionResults.forEach(r=>{domainStats[r.domain].total++;if(r.outcome==="correct")domainStats[r.domain].correct++;else domainStats[r.domain].weakQuestions.push(r.q);});const weakAreas=Object.entries(domainStats).filter(([,s])=>s.total>0&&Math.round(s.correct/s.total*100)<60).map(([,s])=>s.name);return{exam:EXAM_NAME,date:new Date().toISOString().split("T")[0],score:Math.round(questionResults.filter(r=>r.outcome==="correct").length/QUESTIONS.length*100),domains:domainStats,weakAreas};}
function triggerDownload(report){const blob=new Blob([JSON.stringify(report,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`${EXAM_NAME.replace(/ /g,"-").toLowerCase()}-results-${report.date}.json`;a.click();}
function autoDownload(){triggerDownload(buildReport());}
document.getElementById("downloadBtn").addEventListener("click",()=>{triggerDownload(buildReport());});
submitBtn.addEventListener("click",showFeedback);nextBtn.addEventListener("click",()=>{current++;renderQuestion(current);});finishBtn.addEventListener("click",()=>{finishBtn.style.display="none";showScore();autoDownload();});document.getElementById("restartBtn").addEventListener("click",()=>{current=0;results=[];questionResults=[];scoreCard.style.display="none";finishBtn.style.display="none";renderQuestion(0);});
renderQuestion(0);
</script>
</body>
