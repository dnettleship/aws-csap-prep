tn{margin-top:1.25rem;display:inline-block;background:var(--surface2);color:var(--text);font-size:.85rem;font-weight:600;padding:.55rem 1.25rem;border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:border-color .15s}.download-btn:hover{border-color:var(--accent)}.btn-restart{margin-top:.75rem;display:inline-block;background:var(--surface2);color:var(--text);font-size:.9rem;font-weight:600;padding:.65rem 1.5rem;border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:border-color .15s}.btn-restart:hover{border-color:var(--accent)}

<script>
const EXAM_NAME="Mock Exam 2";
const QUESTIONS=[
  {id:"q1",domain:1,text:"A company has 60 AWS accounts in an Organisation. The security team wants all accounts automatically enrolled in GuardDuty, with findings centralised in a dedicated security account. Internal vulnerability scans from a known CIDR range produce noise and must be suppressed organisation-wide. Which architecture is correct?",options:{A:"Enable GuardDuty individually in every account; configure each account to export findings to a central S3 bucket; use Athena to query across accounts.",B:"Designate the security account as the GuardDuty delegated administrator via AWS Organizations. Enable auto-enable for new member accounts. Create GuardDuty suppression rules in the delegated administrator account — these apply org-wide.",C:"Designate the security account as the GuardDuty delegated administrator. Enable auto-enable. Create suppression rules in each individual member account to filter findings from the scanning CIDR.",D:"Configure Security Hub in the security account as the aggregation layer; enable the GuardDuty integration. Create Security Hub suppression filters to hide scanning findings."}},
  {id:"q2",domain:2,text:"An e-commerce platform publishes order events from multiple producers at up to 8,000 events/second. Events for the same customer must be processed in strict sequence. Each event must be processed exactly once. Consumers are Lambda functions. Which architecture satisfies all three constraints?",options:{A:"SNS Standard topic fanning out to an SQS Standard queue. Lambda consumer adds idempotency keys and sorts events by timestamp before processing.",B:"Kinesis Data Streams (partition key = customer_id, 20 shards). Lambda event source mapping with bisect-on-error enabled. Kinesis preserves per-shard order and Lambda deduplicates with idempotency tokens.",C:"SQS FIFO queue with message group ID set to customer_id and a deduplication ID set to the event's unique identifier. Lambda event source mapping on the FIFO queue.",D:"EventBridge custom event bus routing to an SQS FIFO queue. Lambda with reserved concurrency of 1 to force single-threaded sequential processing across all customers."}},
  {id:"q3",domain:2,text:"A global gaming platform needs writes to DynamoDB with under 50 ms latency from both us-east-1 and eu-west-1. The same game-state item can be written from both regions within milliseconds of each other. The team wants the least operational overhead. Which configuration handles this correctly?",options:{A:"Two independent DynamoDB tables (one per region) with a Lambda function on each DynamoDB Stream that replicates changes to the other region every 60 seconds.",B:"DynamoDB Global Tables with last-writer-wins conflict resolution (based on wall-clock timestamp). The application is designed to tolerate this resolution strategy for simultaneous writes.",C:"DynamoDB Global Tables combined with DynamoDB Streams and a Lambda-based custom reconciliation function that compares conflicting writes and selects the higher game score.",D:"Aurora Global Database with a primary writer in us-east-1 and a secondary in eu-west-1. Enable write forwarding so eu-west-1 writes are forwarded to the primary with under 50 ms added latency."}},
  {id:"q4",domain:1,text:"A company runs a proprietary TCP API (port 443) in a shared-services VPC that serves 40 spoke VPCs across multiple accounts. Spoke VPCs must only be able to reach this specific API — they must have no other connectivity to the shared-services VPC or to each other. Which solution is correct?",options:{A:"Transit Gateway with spoke-to-hub route tables. Spoke attachments only have a route to the shared-services VPC attachment. Security groups on the API allow port 443 from spoke VPC CIDRs.",B:"VPC peering from each spoke to the shared-services VPC. Network ACLs and security groups restrict traffic to port 443 only. No spoke-to-spoke peering is created.",C:"AWS PrivateLink — expose the API behind a Network Load Balancer in the shared-services VPC as a VPC endpoint service. Each spoke account creates a VPC interface endpoint to consume it. No other routing is established.",D:"Transit Gateway with appliance mode enabled. A stateful firewall in the shared-services VPC inspects all spoke traffic and allows only port 443 to the API."}},
  {id:"q5",domain:3,text:"A company runs 200 On-Demand EC2 instances (mixed m5, c5, r5 families across us-east-1 and eu-west-1) plus 50 Fargate tasks and 20 Lambda functions, all 24/7. They want maximum savings with full flexibility to change instance families, sizes, and regions over time without incurring additional commitment costs. Which purchasing strategy is correct?",options:{A:"EC2 Instance Savings Plans sized to cover each instance family per region for EC2. Purchase a separate Compute Savings Plans to cover Fargate and Lambda.",B:"Compute Savings Plans at a spend rate covering the combined baseline of EC2, Fargate, and Lambda. One plan covers all families, sizes, regions, and all three services.",C:"Standard Reserved Instances for each current EC2 instance type and region. Purchase Compute Savings Plans separately for Fargate and Lambda.",D:"EC2 Instance Savings Plans for EC2 (higher EC2 discount than Compute SP). Compute Savings Plans for Fargate and Lambda. Split the commitment to maximise total savings."}},
  {id:"q6",domain:4,text:"A company has a 1 Gbps Direct Connect connection used by workloads across 15 VPCs. They need automatic failover to a Site-to-Site VPN if the DX link goes down, with BGP routing shifting traffic automatically in under 60 seconds. New VPCs must be connectable without changes to the failover configuration. Which architecture is correct?",options:{A:"DX connection to a Virtual Private Gateway in the primary VPC. VPN also on the VGW. BGP AS_PATH prepending on the VPN makes DX preferred. On DX failure, VGW reconverges. Each VPC needs its own VGW and VPN.",B:"DX connection via a Direct Connect Gateway to a Transit Gateway. VPN also terminated on the same Transit Gateway. BGP AS_PATH prepending on the VPN attachment makes DX preferred. New VPCs attach to TGW without touching the failover configuration.",C:"DX connection to a Direct Connect Gateway associated with individual VGWs in each VPC. VPN terminated on a separate TGW for the 15 VPCs. No single BGP reconvergence — VGW and TGW operate independently.",D:"Two DX connections from two providers in an active-passive LAG for redundancy. VPN as a non-BGP static-route backup that only activates via a manual Lambda failover function."}},
  {id:"q7",domain:2,text:"A SaaS platform's Aurora database must auto-scale to handle unpredictable tenant load (from near-zero to peak within seconds) without manual intervention. Zero downtime is required at all times — the team cannot accept any resume delay. Cost during idle periods should be minimised. Which Aurora configuration is correct?",options:{A:"Aurora Provisioned (db.r6g.4xlarge) with Aurora Auto Scaling adding read replicas on high CPU. Writes always go to the provisioned writer which does not scale vertically.",B:"Aurora Serverless v1 — scales to 0 ACUs when idle (pause mode) to eliminate cost. Resumes automatically on new connections, though cold-start takes 15–30 seconds.",C:"Aurora Serverless v2 — scales from 0.5 ACUs continuously up to 128 ACUs per instance with no pause/resume cold-start. Supports Multi-AZ. Minimum cost is 0.5 ACU-hours, not zero.",D:"Aurora Serverless v2 configured with a minimum capacity of 0 ACUs — scales to zero when idle for maximum cost savings, and scales up instantly on new connections."}},
  {id:"q8",domain:3,text:"An operations team needs an automated remediation workflow that triggers when an EC2 instance sustains CPU &gt; 95% for 10 minutes. The workflow must: (1) collect a diagnostics bundle via SSM Run Command, (2) create an AMI of the instance, (3) notify a Slack channel via a Lambda webhook, and (4) terminate the instance through its Auto Scaling Group. All steps must be auditable with per-step pass/fail status. Which architecture best satisfies the auditability requirement?",options:{A:"CloudWatch Alarm (10-min CPU breach) → SNS → single Lambda function that runs all four steps sequentially in code. CloudWatch Logs captures the Lambda output as the audit trail.",B:"CloudWatch Alarm → EventBridge rule → AWS Step Functions Standard Workflow with four sequential states, each calling the appropriate service (SSM, EC2, Lambda/SNS, Auto Scaling). Step Functions console shows per-state execution status, input/output, and retry history.",C:"CloudWatch Alarm → SNS → SSM Automation document with four steps (runCommand, createImage, invokeWebhook, terminateInstance). SSM records execution history with per-step status.",D:"CloudWatch Alarm → EventBridge → SSM Automation document. SSM Automation orchestrates the four steps and records a pass/fail for each step in the Systems Manager console."}},
  {id:"q9",domain:4,text:"A company is migrating an Oracle 19c database (3 TB) to Aurora PostgreSQL. The source uses PL/SQL stored procedures, Oracle sequences, and synonyms. The team needs under 30 minutes of cutover downtime and must validate row-level data integrity between source and target. Which migration sequence is correct?",options:{A:"Use AWS DMS in full-load mode only. After the load completes, cut over during a maintenance window. Rewrite PL/SQL stored procedures manually in the target database post-migration.",B:"Use AWS Schema Conversion Tool (SCT) to convert the Oracle schema, DDL, and PL/SQL to Aurora PostgreSQL equivalents. Then use AWS DMS with full load + Change Data Capture (CDC) to migrate data and keep the target in sync. Enable DMS data validation to compare source and target row counts and checksums continuously. Cut over when lag is under 1 second.",C:"Use AWS SCT for schema conversion. Use AWS DMS full load (no CDC) with the target endpoint in bulk-load mode. After the load, export row counts from Oracle and compare manually to Aurora. Accept the extended downtime window.",D:"Use the DMS Schema Conversion feature (integrated in the DMS console) to convert the Oracle schema and migrate data in a single workflow. This replaces both SCT and a separate DMS task."}},
  {id:"q10",domain:1,text:"A company with 30 AWS accounts uses IAM Identity Center with Okta as the external IdP. Engineers belong to teams (backend, frontend, data) and work across dev and prod accounts. The security team wants fine-grained access control without maintaining a permission set per team per account. Which approach scales correctly?",options:{A:"Create one Permission Set per team-environment combination (backend-dev, backend-prod, frontend-dev, frontend-prod, data-dev, data-prod) and assign each to the relevant accounts in Identity Center.",B:"Create two broad Permission Sets (Developer, Admin). Use SCPs on account OUs to restrict what the Developer role can do in prod accounts. Assign Developer broadly.",C:"Use ABAC with IAM Identity Center — configure Okta to pass team and environment as session tags via the SAML assertion. Write Permission Set IAM policies with aws:PrincipalTag conditions (e.g., allow only when PrincipalTag/Team matches the resource tag). One Permission Set covers all teams; access decisions happen at policy evaluation time.",D:"Create IAM roles manually in each account with trust policies that reference the Identity Center SAML provider endpoint and use Condition keys to check SAML attributes. Manage assignments per account."}}
];
const ANSWERS={
  q1:{correct:"B",explanation:"The delegated administrator model centralises GuardDuty management — auto-enable enrolls new accounts automatically. Suppression rules created in the delegated admin account apply across all member accounts. Option C is wrong because suppression rules in individual member accounts only affect that account's findings, not the aggregated view. Security Hub (D) aggregates findings but cannot control GuardDuty suppression. Manual per-account setup (A) defeats the purpose of Organizations integration.",link:"../../domains/01-organizational-complexity/index.html"},
  q2:{correct:"C",explanation:"SQS FIFO with message group ID = customer_id guarantees per-customer ordering (messages in the same group are processed in sequence). Deduplication IDs provide exactly-once delivery natively. Lambda's SQS trigger supports FIFO queues. Kinesis (B) preserves per-shard order but requires custom idempotency logic — it does not guarantee exactly-once delivery alone. SNS Standard (A) has no ordering and at-least-once delivery. EventBridge → FIFO (D) would work for routing, but reserved concurrency of 1 creates a global bottleneck across all customers.",link:"../../services/messaging/sqs-sns-eventbridge.html"},
  q3:{correct:"B",explanation:"DynamoDB Global Tables is the managed active-active multi-region solution with sub-millisecond local writes. Last-writer-wins (based on wall-clock time) is the built-in conflict resolution — the application must be designed around it. Option C adds Lambda reconciliation but the question asks for least operational overhead; the added complexity is not justified unless business logic requires it. Custom Lambda replication (A) introduces 60-second lag and operational burden. Aurora Global Database (D) is a relational database, not DynamoDB, and write forwarding adds latency rather than providing local writes.",link:"../../services/databases/dynamodb.html"},
  q4:{correct:"C",explanation:"PrivateLink is purpose-built for one-directional service consumption: spokes can reach only the exposed endpoint, not any other resource in the shared-services VPC. There are no CIDR overlap concerns and no transitive routing. TGW (A) provides routing isolation via route tables, but spoke VPCs technically have a network path into the shared-services VPC — security groups must plug every gap. VPC peering (B) is bidirectional and doesn't scale cleanly to 40 consumers. TGW with appliance mode (D) adds cost and complexity when PrivateLink is the native fit.",link:"../../services/networking/transit-gateway.html"},
  q5:{correct:"B",explanation:"Compute Savings Plans cover EC2 (any family, size, region, OS), Fargate, and Lambda in a single commitment — maximum flexibility. One plan, one commitment rate. EC2 Instance Savings Plans (A, D) give a slightly higher EC2 discount but are locked to a family and region, so changing families or regions would require a new plan or result in On-Demand pricing. Standard RIs (C) are the least flexible and don't cover Fargate or Lambda at all. For organisations needing cross-family and cross-region flexibility, a single Compute SP is the correct answer.",link:"../../domains/04-cost-performance/index.html"},
  q6:{correct:"B",explanation:"Terminating both the DX connection (via DX Gateway) and the VPN on the same Transit Gateway is the modern, scalable architecture. BGP AS_PATH prepending on the VPN attachment makes DX the preferred path. When DX fails, BGP reconverges automatically within seconds using the VPN path. New VPCs simply attach to the TGW — no changes to failover configuration. Option A requires a separate VGW and VPN per VPC, which doesn't scale. Option C splits DX and VPN across different gateways, preventing unified BGP failover. Option D uses a non-BGP static VPN with manual Lambda failover, which cannot meet the 60-second RTO.",link:"../../services/networking/transit-gateway.html"},
  q7:{correct:"C",explanation:"Aurora Serverless v2 scales continuously from 0.5 ACUs with no pause/resume cold-start, satisfying both the zero-downtime requirement and rapid scale-up. It supports Multi-AZ and read replicas unlike v1. Option D is incorrect: Serverless v2 cannot be set to 0 ACU minimum — that is a Serverless v1 behaviour. Option B (Serverless v1) can pause to 0 ACUs but the 15–30 second cold-start on resume violates the zero-downtime requirement. Option A (provisioned) doesn't auto-scale the writer instance vertically.",link:"../../services/databases/aurora.html"},
  q8:{correct:"B",explanation:"Step Functions Standard Workflows provide the richest auditability: a visual execution graph, per-state input/output, timestamps, error details, and retry history — all queryable in the console and exportable via CloudWatch. Each of the four steps is a discrete, inspectable state. SSM Automation (C, D) records per-step pass/fail and is a valid approach, but it has weaker native integration with non-SSM steps (Slack Lambda, Auto Scaling terminate-instance) and lacks the visual execution graph. A single Lambda (A) produces only log lines — no structured per-step audit.",link:"../../domains/02-new-solutions/index.html"},
  q9:{correct:"B",explanation:"For heterogeneous migrations (Oracle → Aurora PostgreSQL), SCT is required first to convert schema objects and PL/SQL code that DMS cannot translate. DMS full load + CDC then handles the data migration with continuous replication, enabling a short cutover window. DMS built-in data validation compares row counts and checksums continuously without manual exports. Option A skips schema conversion — DMS cannot migrate PL/SQL stored procedures. Option C accepts extended downtime (full load only) and relies on manual row-count comparison. Option D (DMS Schema Conversion) handles simpler schemas but has significantly less coverage for complex Oracle PL/SQL than the standalone SCT tool.",link:"../../domains/03-migration-modernization/index.html"},
  q10:{correct:"C",explanation:"ABAC with Identity Center session tags is the scalable approach: pass team and environment attributes from Okta via the SAML assertion, write IAM policy conditions against those tags, and use a single Permission Set per access tier. Access decisions are made at policy evaluation time — no O(teams × environments × accounts) permission set matrix. Option A creates an unmanageable number of permission sets as the org grows. Option B uses SCPs as a blunt instrument to compensate for overly broad permission sets, which is fragile. Option D abandons Identity Center's centralised assignment model and requires per-account role management.",link:"../../services/security/iam-organizations.html"}
};
const DOMAIN_NAMES={1:"Org Complexity",2:"New Solutions",3:"Continuous Improvement",4:"Migration"};
const DOMAIN_LABELS={1:{label:"Domain 1 \u2014 Org Complexity",cls:"tag-d1"},2:{label:"Domain 2 \u2014 New Solutions",cls:"tag-d2"},3:{label:"Domain 3 \u2014 Continuous Improvement",cls:"tag-d3"},4:{label:"Domain 4 \u2014 Migration",cls:"tag-d4"}};
let current=0,results=[],questionResults=[];
const qCounter=document.getElementById("qCounter"),progressBar=document.getElementById("progressBar"),card=document.getElementById("questionCard"),domainTag=document.getElementById("qDomainTag"),qNumber=document.getElementById("qNumber"),qText=document.getElementById("qText"),qOptions=document.getElementById("qOptions"),resultBadge=document.getElementById("resultBadge"),submitBtn=document.getElementById("submitBtn"),nextBtn=document.getElementById("nextBtn"),finishBtn=document.getElementById("finishBtn"),scoreCard=document.getElementById("score-card");
function renderQuestion(idx){const q=QUESTIONS[idx],d=DOMAIN_LABELS[q.domain];card.className="question-card";domainTag.textContent=d.label;domainTag.className="domain-tag card-tag "+d.cls;qNumber.textContent="Q"+(idx+1);qText.innerHTML=q.text;qCounter.textContent="Question "+(idx+1)+" of "+QUESTIONS.length;progressBar.style.width=(idx/QUESTIONS.length*100)+"%";resultBadge.className="result-badge";resultBadge.innerHTML="";qOptions.innerHTML="";Object.entries(q.options).forEach(([val,text])=>{const label=document.createElement("label");label.className="option";label.innerHTML=`<input type="radio" name="answer" value="${val}"/><span class="option-label"><strong>${val}.</strong> ${text}</span>`;qOptions.appendChild(label);});submitBtn.style.display="inline-block";submitBtn.disabled=false;nextBtn.style.display="none";finishBtn.style.display="none";document.querySelector(".exam-wrap").scrollIntoView({behavior:"smooth",block:"start"});}
function showFeedback(){const selected=document.querySelector('input[name="answer"]:checked');const q=QUESTIONS[current],data=ANSWERS[q.id];document.querySelectorAll('input[name="answer"]').forEach(r=>r.disabled=true);document.querySelectorAll('input[name="answer"]').forEach(radio=>{if(radio.value===data.correct)radio.closest(".option").classList.add("show-correct");});let outcome;if(!selected){outcome="skipped";card.classList.add("state-incorrect");resultBadge.className="result-badge incorrect-msg";resultBadge.innerHTML=`&#9888; Skipped. Correct: <strong>${data.correct}</strong>. ${data.explanation} <a href="${data.link}">Review &rarr;</a>`;}else if(selected.value===data.correct){outcome="correct";card.classList.add("state-correct");resultBadge.className="result-badge correct-msg";resultBadge.innerHTML=`&#10003; Correct! ${data.explanation}`;}else{outcome="incorrect";card.classList.add("state-incorrect");selected.closest(".option").classList.add("show-wrong");resultBadge.className="result-badge incorrect-msg";resultBadge.innerHTML=`&#10007; You chose <strong>${selected.value}</strong>; correct: <strong>${data.correct}</strong>. ${data.explanation} <a href="${data.link}">Review &rarr;</a>`;}results.push(outcome);questionResults.push({q:q.id,domain:q.domain,outcome,chosen:selected?selected.value:null,correct:data.correct});submitBtn.style.display="none";if(current<QUESTIONS.length-1)nextBtn.style.display="inline-block";else finishBtn.style.display="inline-block";}
function showScore(){const correct=results.filter(r=>r==="correct").length,incorrect=results.filter(r=>r==="incorrect").length,skipped=results.filter(r=>r==="skipped").length,pct=Math.round(correct/QUESTIONS.length*100);document.getElementById("countCorrect").textContent=correct;document.getElementById("countIncorrect").textContent=incorrect;document.getElementById("countUnanswered").textContent=skipped;const scoreEl=document.getElementById("scorePercent"),labelEl=document.getElementById("scoreLabel");scoreEl.textContent=pct+"%";if(pct>=75){scoreEl.className="score-number pass";labelEl.textContent="Pass — great work!";}else if(pct>=60){scoreEl.className="score-number marginal";labelEl.textContent="Close — review the weak domains below.";}else{scoreEl.className="score-number fail";labelEl.textContent="Keep studying — focus on the domains highlighted below.";}const domainStats={};[1,2,3,4].forEach(d=>{domainStats[d]={correct:0,total:0};});questionResults.forEach(r=>{domainStats[r.domain].total++;if(r.outcome==="correct")domainStats[r.domain].correct++;});const breakdownEl=document.getElementById("domainBreakdown");breakdownEl.innerHTML="";[1,2,3,4].forEach(d=>{const s=domainStats[d];if(!s.total)return;const pctD=Math.round(s.correct/s.total*100),weak=pctD<60;const row=document.createElement("div");row.className="domain-row";row.innerHTML=`<span class="d-label">${DOMAIN_NAMES[d]}</span><div class="domain-bar-bg"><div class="domain-bar${weak?" weak":""}" style="width:${pctD}%"></div></div><span class="d-score" style="color:${weak?"#f87171":"#4ade80"}">${s.correct}/${s.total} (${pctD}%)</span>`;breakdownEl.appendChild(row);});progressBar.style.width="100%";scoreCard.style.display="block";scoreCard.scrollIntoView({behavior:"smooth",block:"start"});}
document.getElementById("downloadBtn").addEventListener("click",()=>{const domainStats={};[1,2,3,4].forEach(d=>{domainStats[d]={name:DOMAIN_NAMES[d],correct:0,total:0,weakQuestions:[]};});questionResults.forEach(r=>{domainStats[r.domain].total++;if(r.outcome==="correct")domainStats[r.domain].correct++;else domainStats[r.domain].weakQuestions.push(r.q);});const weakAreas=Object.entries(domainStats).filter(([,s])=>s.total>0&&Math.round(s.correct/s.total*100)<60).map(([,s])=>s.name);const report={exam:EXAM_NAME,date:new Date().toISOString().split("T")[0],score:Math.round(questionResults.filter(r=>r.outcome==="correct").length/QUESTIONS.length*100),domains:domainStats,weakAreas};const blob=new Blob([JSON.stringify(report,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`${EXAM_NAME.replace(/ /g,"-").toLowerCase()}-results-${report.date}.json`;a.click();});
submitBtn.addEventListener("click",showFeedback);nextBtn.addEventListener("click",()=>{current++;renderQuestion(current);});finishBtn.addEventListener("click",()=>{finishBtn.style.display="none";showScore();});document.getElementById("restartBtn").addEventListener("click",()=>{current=0;results=[];questionResults=[];scoreCard.style.display="none";finishBtn.style.display="none";renderQuestion(0);});
renderQuestion(0);
</script>
</body>
</html>
