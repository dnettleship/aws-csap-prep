<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mock Exam 2 — SAP-C02</title>
  <link rel="stylesheet" href="../../site.css" />
  <style>
    .exam-wrap{max-width:760px;margin:0 auto}
    .exam-meta{display:flex;align-items:center;justify-content:space-between;gap:1rem;margin-bottom:1.25rem;flex-wrap:wrap}
    .q-counter{color:var(--muted);font-size:.85rem}
    .progress-bar-wrap{background:var(--surface2);border-radius:999px;height:5px;flex:1;min-width:120px;overflow:hidden}
    .progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),#818cf8);border-radius:999px;transition:width .35s ease;width:0%}
    .question-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.75rem}
    .question-card.state-correct{border-color:#22c55e}.question-card.state-incorrect{border-color:#ef4444}
    .question-header{display:flex;align-items:flex-start;gap:.75rem;margin:.75rem 0 1.25rem}
    .question-number{background:var(--surface2);color:var(--muted);font-size:.7rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:.25rem .6rem;border-radius:6px;white-space:nowrap;margin-top:2px;flex-shrink:0}
    .question-text{font-size:.975rem;line-height:1.65}
    .options{display:flex;flex-direction:column;gap:.6rem}
    .option{display:flex;align-items:flex-start;gap:.75rem;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:.75rem 1rem;cursor:pointer;transition:border-color .15s,background .15s;user-select:none}
    .option:hover{border-color:#4f5b7a}
    .option input[type=radio]{accent-color:var(--accent);margin-top:2px;flex-shrink:0;width:16px;height:16px}
    .option-label{font-size:.9rem;line-height:1.55;color:var(--text-muted)}
    .option.show-correct{border-color:#22c55e!important;background:#052e16!important}
    .option.show-wrong{border-color:#ef4444!important;background:#2d0a0a!important}
    .option.show-correct .option-label,.option.show-wrong .option-label{color:var(--text)}
    .result-badge{display:none;font-size:.8rem;margin-top:1.1rem;padding:.65rem .9rem;border-radius:8px;line-height:1.6}
    .result-badge.correct-msg{display:block;background:#052e16;color:#86efac;border:1px solid #166534}
    .result-badge.incorrect-msg{display:block;background:#2d0a0a;color:#fca5a5;border:1px solid #7f1d1d}
    .result-badge a{color:#93c5fd;text-underline-offset:3px}
    .exam-actions{display:flex;gap:.75rem;margin-top:1.5rem;justify-content:flex-end}
    .btn-primary{background:linear-gradient(135deg,var(--accent),#818cf8);color:#fff;font-size:.95rem;font-weight:600;padding:.75rem 1.75rem;border:none;border-radius:8px;cursor:pointer;transition:opacity .2s,transform .1s}
    .btn-primary:hover{opacity:.88}.btn-primary:active{transform:scale(.98)}.btn-primary:disabled{opacity:.35;cursor:not-allowed}
    #score-card{display:none;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:2.5rem 2rem;text-align:center}
    #score-card h2{font-size:1.4rem;margin-bottom:.5rem}
    .score-number{font-size:3.5rem;font-weight:800;letter-spacing:-.03em;margin:.5rem 0}
    .score-label{color:var(--muted);font-size:.9rem}
    .score-breakdown{display:flex;justify-content:center;gap:2.5rem;margin-top:1.5rem;flex-wrap:wrap}
    .breakdown-item .val{font-size:1.5rem;font-weight:700}
    .breakdown-item .lbl{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:.2rem}
    .pass{color:#4ade80}.marginal{color:#fbbf24}.fail{color:#f87171}
    .correct-val{color:#4ade80}.incorrect-val{color:#f87171}
    .domain-report{margin-top:1.5rem;text-align:left;border-top:1px solid var(--border);padding-top:1.25rem}
    .domain-report h3{font-size:.85rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:.75rem}
    .domain-row{display:flex;align-items:center;gap:.75rem;margin-bottom:.5rem;font-size:.88rem}
    .domain-row .d-label{flex:1;color:var(--text-muted)}
    .domain-row .d-score{font-weight:700;min-width:60px;text-align:right}
    .domain-bar-bg{flex:2;background:var(--surface2);border-radius:999px;height:6px;overflow:hidden}
    .domain-bar{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--accent),#818cf8)}
    .domain-bar.weak{background:linear-gradient(90deg,#ef4444,#f87171)}
    .download-btn{margin-top:1.25rem;display:inline-block;background:var(--surface2);color:var(--text);font-size:.85rem;font-weight:600;padding:.55rem 1.25rem;border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:border-color .15s}
    .download-btn:hover{border-color:var(--accent)}
    .btn-restart{margin-top:.75rem;display:inline-block;background:var(--surface2);color:var(--text);font-size:.9rem;font-weight:600;padding:.65rem 1.5rem;border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:border-color .15s}
    .btn-restart:hover{border-color:var(--accent)}
  </style>
</head>

<div class="page">
  <nav class="breadcrumb">

  <div class="page-header">
    <div class="domain-tag card-tag tag-cheat">Practice</div>
    <h1>Mock Exam 2</h1>
    <p class="subtitle">10 questions &bull; One at a time &bull; Passing score: 75%</p>
  </div>
  <div class="exam-wrap">
    <div class="exam-meta">
      <span class="q-counter" id="qCounter">Question 1 of 10</span>
      <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>
    </div>
    <div class="question-card" id="questionCard">
      <span class="domain-tag" id="qDomainTag"></span>
      <div class="question-header"><span class="question-number" id="qNumber"></span><p class="question-text" id="qText"></p></div>
      <div class="options" id="qOptions"></div>
      <div class="result-badge" id="resultBadge"></div>
    </div>
    <div class="exam-actions">
      <button class="btn-primary" id="submitBtn">Submit Answer</button>
      <button class="btn-primary" id="nextBtn" style="display:none">Next Question &rarr;</button>
      <button class="btn-primary" id="finishBtn" style="display:none">See My Results &rarr;</button>
    </div>
    <div id="score-card">
      <h2>Your Result</h2>
      <div class="score-number" id="scorePercent"></div>
      <div class="score-label" id="scoreLabel"></div>
      <div class="score-breakdown">
        <div class="breakdown-item"><div class="val correct-val" id="countCorrect">0</div><div class="lbl">Correct</div></div>
        <div class="breakdown-item"><div class="val incorrect-val" id="countIncorrect">0</div><div class="lbl">Incorrect</div></div>
        <div class="breakdown-item"><div class="val" id="countUnanswered">0</div><div class="lbl">Skipped</div></div>
      </div>
      <div class="domain-report">
        <h3>Domain Breakdown</h3>
        <div id="domainBreakdown"></div>
      </div>
      <button class="download-btn" id="downloadBtn">&#11015; Download Results JSON</button><br>
      <button class="btn-restart" id="restartBtn">Restart Exam</button>
    </div>
  </div>
</div>
<script>
const EXAM_NAME="Mock Exam 2";
const QUESTIONS=[
  {id:"q1",domain:1,text:"A company needs all EC2 instances launched in any org account to use approved AMIs from a specific list. Individual account admins must not override this. What is the correct approach?",options:{A:"IAM policy in each account restricting RunInstances to approved AMI IDs.",B:"SCP on the org root denying ec2:RunInstances with a condition when the AMI is not in the approved list.",C:"AWS Config rule that terminates non-compliant instances after launch.",D:"AWS Service Catalog approved AMI products with direct EC2 console access disabled."}},
  {id:"q2",domain:2,text:"Users must sign in via Google or Facebook, then get temporary AWS credentials to call DynamoDB directly from a browser. The DynamoDB table must remain private. Which combination achieves this?",options:{A:"IAM federation with SAML 2.0 for Google/Facebook.",B:"Cognito User Pools (social IdP auth) + Identity Pools (exchange Cognito token for temporary IAM credentials).",C:"Cognito User Pools only — configure a DynamoDB resource policy referencing the User Pool ARN.",D:"IAM Identity Center with Google Workspace IdP."}},
  {id:"q3",domain:1,text:"A company wants to prevent any account from creating resources outside of us-east-1 and eu-west-1, excluding global services like IAM and Route 53. Which mechanism enforces this?",options:{A:"IAM policy with Deny for all actions with a region condition applied to all users.",B:"Config rules detecting out-of-region resources with auto-remediation to delete them.",C:"SCP with Deny on all actions where the requested region is not in the approved list, with a NotAction for global services.",D:"Control Tower guardrails restricting available regions in the console."}},
  {id:"q4",domain:2,text:"A serverless API must route requests to Lambda based on HTTP method and path, validate JWT tokens, and enforce per-client rate limits. Which service provides all of this?",options:{A:"ALB with Lambda targets and a Cognito authoriser.",B:"API Gateway REST API with Lambda integrations, a Lambda authoriser for JWT, and usage plans for rate limiting.",C:"CloudFront with Lambda@Edge for routing and auth.",D:"AWS AppSync with Lambda resolvers."}},
  {id:"q5",domain:1,text:"A company uses AWS RAM to share a Transit Gateway across org accounts. A newly created member account cannot see the shared TGW. What is the most likely cause?",options:{A:"The TGW requires a separate invitation accepted by the member account.",B:"Trusted access for RAM with Organizations must be enabled; the new account may not yet be in the OU covered by the resource share.",C:"Transit Gateways cannot be shared via RAM — each account must create its own.",D:"The member account needs AWS Config enabled before RAM shares are visible."}},
  {id:"q6",domain:2,text:"A company needs a database for graph relationships (friendships, followers) that can traverse those relationships efficiently at scale. Which AWS service is most appropriate?",options:{A:"DynamoDB with adjacency list design.",B:"RDS PostgreSQL with recursive CTEs.",C:"Amazon Neptune — purpose-built graph database supporting Gremlin and openCypher.",D:"Amazon Keyspaces (Cassandra) with wide-column graph modelling."}},
  {id:"q7",domain:1,text:"A security team needs centralised alerting when any IAM user creates an access key or when root credentials are used across the organisation. Which architecture achieves this?",options:{A:"AWS Config in each account with iam-user-no-console-access rule; results to central S3.",B:"Organisation CloudTrail → CloudWatch Logs metric filters for CreateAccessKey and root login → SNS alerts.",C:"Security Hub with a custom insight for IAM events in each account.",D:"GuardDuty in all accounts — it detects access key creation and root usage by default."}},
  {id:"q8",domain:3,text:"An application queries RDS MySQL on every page load for product catalogue data that changes once per day. RDS CPU is at 90% with 5,000 concurrent users. What is the best solution?",options:{A:"Upgrade the RDS instance class.",B:"Add an RDS Read Replica and load-balance reads.",C:"Implement ElastiCache Redis with lazy loading for the catalogue query; TTL of 24 hours.",D:"Enable RDS Proxy to pool connections."}},
  {id:"q9",domain:4,text:"A company needs to transfer an on-premises NFS share (50 TB) to Amazon EFS over Direct Connect with automated scheduling. Which service should they use?",options:{A:"Snowball Edge for offline transfer to S3, then DataSync S3→EFS.",B:"AWS DataSync with an on-premises agent, using Direct Connect to transfer directly to EFS.",C:"Storage Gateway File Gateway — present EFS as on-premises NFS and migrate files.",D:"rsync over DX via a bastion host."}},
  {id:"q10",domain:2,text:"A worker fleet processes SQS jobs. During peaks, the queue depth grows to 100,000 messages and the fleet cannot keep up. What Auto Scaling trigger correctly handles this?",options:{A:"Scale on EC2 CPU utilisation with Target Tracking at 70%.",B:"Scale on ApproximateNumberOfMessagesVisible; target = desired messages per instance.",C:"Scheduled Scaling at known peak times.",D:"Step Scaling on NumberOfMessagesSent."}}
];
const ANSWERS={
  q1:{correct:"B",explanation:"SCP with ec2:ImageID condition key denies RunInstances for non-approved AMIs across all member accounts including root. IAM policies (A) don't restrict root. Config (C) is detective. Service Catalog (D) doesn't prevent direct API access.",link:"../../domains/01-organizational-complexity/index.html"},
  q2:{correct:"B",explanation:"Cognito User Pools authenticates with social IdPs. Identity Pools exchange the token for temporary AWS credentials via an IAM role — the role gives DynamoDB access. IAM SAML (A) doesn't work natively with OAuth social IdPs. User Pools alone (C) don't vend AWS credentials. Identity Center (D) is for workforce identity.",link:"../../services/security/iam-organizations.html"},
  q3:{correct:"C",explanation:"SCP with aws:RequestedRegion condition and NotAction for global services is the standard pattern. IAM policies (A) don't restrict root. Config (B) is reactive. Control Tower guardrails (D) implement this via an SCP under the hood.",link:"../../domains/01-organizational-complexity/index.html"},
  q4:{correct:"B",explanation:"API Gateway REST API provides path/method routing, Lambda authorisers for JWT, and usage plans for per-client rate limiting — all built in. ALB (A) lacks native JWT auth and per-client rate limiting. CloudFront (C) is a CDN. AppSync (D) is for GraphQL.",link:"../../domains/02-new-solutions/index.html"},
  q5:{correct:"B",explanation:"Trusted access between RAM and Organizations must be enabled for org-wide sharing to work automatically. New accounts in a covered OU receive shares without accepting invitations. RAM TGW sharing works fine (C is wrong). Config (D) is unrelated.",link:"../../services/networking/transit-gateway.html"},
  q6:{correct:"C",explanation:"Neptune is purpose-built for graph workloads — traversals are O(relationships), not O(table size). DynamoDB (A) can model graphs but traversal queries are complex. RDS (B) handles graphs but poorly at scale. Keyspaces (D) is a wide-column store, not a graph DB.",link:"../../domains/02-new-solutions/index.html"},
  q7:{correct:"B",explanation:"Organisation CloudTrail captures all API calls. CloudWatch Logs metric filters on specific events (CreateAccessKey, ConsoleLogin for root) with SNS notification is the canonical solution. Config (A) checks configuration state. Security Hub (C) aggregates findings. GuardDuty (D) detects anomalies, not specific API calls.",link:"../../domains/01-organizational-complexity/index.html"},
  q8:{correct:"C",explanation:"ElastiCache lazy loading with 24h TTL caches catalogue query results — subsequent requests skip RDS entirely. Upgrading RDS (A) costs more without fixing the root cause. Read replica (B) still hits the DB every page load. RDS Proxy (D) reduces connection overhead but the query still runs.",link:"../../services/databases/elasticache.html"},
  q9:{correct:"B",explanation:"DataSync with an on-premises agent is purpose-built for automated, scheduled NFS→EFS transfers over DX. Snowball (A) is for offline bulk transfers — overkill with DX available. Storage Gateway (C) presents cloud storage as NFS but won't migrate existing data to EFS. rsync (D) is manual.",link:"../../domains/04-cost-performance/index.html"},
  q10:{correct:"B",explanation:"SQS ApproximateNumberOfMessagesVisible target tracking lets you maintain a target backlog per instance. CPU (A) lags behind queue depth. Scheduled scaling (C) doesn't respond to actual load. NumberOfMessagesSent (D) measures inflow, not backlog.",link:"../../services/messaging/sqs-sns-eventbridge.html"}
};
const DOMAIN_NAMES={1:"Org Complexity",2:"New Solutions",3:"Continuous Improvement",4:"Migration"};
const DOMAIN_LABELS={1:{label:"Domain 1 \u2014 Org Complexity",cls:"tag-d1"},2:{label:"Domain 2 \u2014 New Solutions",cls:"tag-d2"},3:{label:"Domain 3 \u2014 Continuous Improvement",cls:"tag-d3"},4:{label:"Domain 4 \u2014 Migration",cls:"tag-d4"}};
let current=0,results=[],questionResults=[];
const qCounter=document.getElementById("qCounter"),progressBar=document.getElementById("progressBar");
const card=document.getElementById("questionCard"),domainTag=document.getElementById("qDomainTag");
const qNumber=document.getElementById("qNumber"),qText=document.getElementById("qText");
const qOptions=document.getElementById("qOptions"),resultBadge=document.getElementById("resultBadge");
const submitBtn=document.getElementById("submitBtn"),nextBtn=document.getElementById("nextBtn");
const finishBtn=document.getElementById("finishBtn"),scoreCard=document.getElementById("score-card");
function renderQuestion(idx){
  const q=QUESTIONS[idx],d=DOMAIN_LABELS[q.domain];
  card.className="question-card";domainTag.textContent=d.label;domainTag.className="domain-tag card-tag "+d.cls;
  qNumber.textContent="Q"+(idx+1);qText.innerHTML=q.text;
  qCounter.textContent="Question "+(idx+1)+" of "+QUESTIONS.length;
  progressBar.style.width=(idx/QUESTIONS.length*100)+"%";
  resultBadge.className="result-badge";resultBadge.innerHTML="";qOptions.innerHTML="";
  Object.entries(q.options).forEach(([val,text])=>{const label=document.createElement("label");label.className="option";label.innerHTML=`<input type="radio" name="answer" value="${val}"/><span class="option-label"><strong>${val}.</strong> ${text}</span>`;qOptions.appendChild(label);});
  submitBtn.style.display="inline-block";submitBtn.disabled=false;nextBtn.style.display="none";finishBtn.style.display="none";
  document.querySelector(".exam-wrap").scrollIntoView({behavior:"smooth",block:"start"});
}
function showFeedback(){
  const selected=document.querySelector('input[name="answer"]:checked');const q=QUESTIONS[current],data=ANSWERS[q.id];
  document.querySelectorAll('input[name="answer"]').forEach(r=>r.disabled=true);
  document.querySelectorAll('input[name="answer"]').forEach(radio=>{if(radio.value===data.correct)radio.closest(".option").classList.add("show-correct");});
  let outcome;
  if(!selected){outcome="skipped";card.classList.add("state-incorrect");resultBadge.className="result-badge incorrect-msg";resultBadge.innerHTML=`&#9888; Skipped. Correct: <strong>${data.correct}</strong>. ${data.explanation} <a href="${data.link}">Review &rarr;</a>`;}
  else if(selected.value===data.correct){outcome="correct";card.classList.add("state-correct");resultBadge.className="result-badge correct-msg";resultBadge.innerHTML=`&#10003; Correct! ${data.explanation}`;}
  else{outcome="incorrect";card.classList.add("state-incorrect");selected.closest(".option").classList.add("show-wrong");resultBadge.className="result-badge incorrect-msg";resultBadge.innerHTML=`&#10007; You chose <strong>${selected.value}</strong>; correct: <strong>${data.correct}</strong>. ${data.explanation} <a href="${data.link}">Review &rarr;</a>`;}
  results.push(outcome);questionResults.push({q:q.id,domain:q.domain,outcome,chosen:selected?selected.value:null,correct:data.correct});
  submitBtn.style.display="none";if(current<QUESTIONS.length-1)nextBtn.style.display="inline-block";else finishBtn.style.display="inline-block";
}
function showScore(){
  const correct=results.filter(r=>r==="correct").length,incorrect=results.filter(r=>r==="incorrect").length,skipped=results.filter(r=>r==="skipped").length,pct=Math.round(correct/QUESTIONS.length*100);
  document.getElementById("countCorrect").textContent=correct;document.getElementById("countIncorrect").textContent=incorrect;document.getElementById("countUnanswered").textContent=skipped;
  const scoreEl=document.getElementById("scorePercent"),labelEl=document.getElementById("scoreLabel");scoreEl.textContent=pct+"%";
  if(pct>=75){scoreEl.className="score-number pass";labelEl.textContent="Pass — great work!";}else if(pct>=60){scoreEl.className="score-number marginal";labelEl.textContent="Close — review weak domains below.";}else{scoreEl.className="score-number fail";labelEl.textContent="Keep studying — focus on highlighted domains.";}
  const domainStats={};[1,2,3,4].forEach(d=>{domainStats[d]={correct:0,total:0};});
  questionResults.forEach(r=>{domainStats[r.domain].total++;if(r.outcome==="correct")domainStats[r.domain].correct++;});
  const breakdownEl=document.getElementById("domainBreakdown");breakdownEl.innerHTML="";
  [1,2,3,4].forEach(d=>{const s=domainStats[d];if(!s.total)return;const pctD=Math.round(s.correct/s.total*100),weak=pctD<60;const row=document.createElement("div");row.className="domain-row";row.innerHTML=`<span class="d-label">${DOMAIN_NAMES[d]}</span><div class="domain-bar-bg"><div class="domain-bar${weak?" weak":""}" style="width:${pctD}%"></div></div><span class="d-score" style="color:${weak?"#f87171":"#4ade80"}">${s.correct}/${s.total} (${pctD}%)</span>`;breakdownEl.appendChild(row);});
  progressBar.style.width="100%";scoreCard.style.display="block";scoreCard.scrollIntoView({behavior:"smooth",block:"start"});
}
document.getElementById("downloadBtn").addEventListener("click",()=>{
  const domainStats={};[1,2,3,4].forEach(d=>{domainStats[d]={name:DOMAIN_NAMES[d],correct:0,total:0,weakQuestions:[]};});
  questionResults.forEach(r=>{domainStats[r.domain].total++;if(r.outcome==="correct")domainStats[r.domain].correct++;else domainStats[r.domain].weakQuestions.push(r.q);});
  const weakAreas=Object.entries(domainStats).filter(([,s])=>s.total>0&&Math.round(s.correct/s.total*100)<60).map(([,s])=>s.name);
  const report={exam:EXAM_NAME,date:new Date().toISOString().split("T")[0],score:Math.round(questionResults.filter(r=>r.outcome==="correct").length/QUESTIONS.length*100),domains:domainStats,weakAreas};
  const blob=new Blob([JSON.stringify(report,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`${EXAM_NAME.replace(/ /g,"-").toLowerCase()}-results-${report.date}.json`;a.click();
});
submitBtn.addEventListener("click",showFeedback);nextBtn.addEventListener("click",()=>{current++;renderQuestion(current);});
finishBtn.addEventListener("click",()=>{finishBtn.style.display="none";showScore();});
document.getElementById("restartBtn").addEventListener("click",()=>{current=0;results=[];questionResults=[];scoreCard.style.display="none";finishBtn.style.display="none";renderQuestion(0);});
renderQuestion(0);
</script>
</body>
