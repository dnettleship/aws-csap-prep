    .exam-wrap{max-width:760px;margin:0 auto}.exam-meta{display:flex;align-items:center;justify-content:space-between;gap:1rem;margin-bottom:1.25rem;flex-wrap:wrap}.q-counter{color:var(--muted);font-size:.85rem}.progress-bar-wrap{background:var(--surface2);border-radius:999px;height:5px;flex:1;min-width:120px;overflow:hidden}.progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),#818cf8);border-radius:999px;transition:width .35s ease;width:0%}.question-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.75rem}.question-card.state-correct{border-color:#22c55e}.question-card.state-incorrect{border-color:#ef4444}.question-header{display:flex;align-items:flex-start;gap:.75rem;margin:.75rem 0 1.25rem}.question-number{background:var(--surface2);color:var(--muted);font-size:.7rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:.25rem .6rem;border-radius:6px;white-space:nowrap;margin-top:2px;flex-shrink:0}.question-text{font-size:.975rem;line-height:1.65}.options{display:flex;flex-direction:column;gap:.6rem}.option{display:flex;align-items:flex-start;gap:.75rem;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:.75rem 1rem;cursor:pointer;transition:border-color .15s,background .15s;user-select:none}.option:hover{border-color:#4f5b7a}.option input[type=radio]{accent-color:var(--accent);margin-top:2px;flex-shrink:0;width:16px;height:16px}.option-label{font-size:.9rem;line-height:1.55;color:var(--text-muted)}.option.show-correct{border-color:#22c55e!important;background:#052e16!important}.option.show-wrong{border-color:#ef4444!important;background:#2d0a0a!important}.option.show-correct .option-label,.option.show-wrong .option-label{color:var(--text)}.result-badge{display:none;font-size:.8rem;margin-top:1.1rem;padding:.65rem .9rem;border-radius:8px;line-height:1.6}.result-badge.correct-msg{display:block;background:#052e16;color:#86efac;border:1px solid #166534}.result-badge.incorrect-msg{display:block;background:#2d0a0a;color:#fca5a5;border:1px solid #7f1d1d}.result-badge a{color:#93c5fd;text-underline-offset:3px}.exam-actions{display:flex;gap:.75rem;margin-top:1.5rem;justify-content:flex-end}.btn-primary{background:linear-gradient(135deg,var(--accent),#818cf8);color:#fff;font-size:.95rem;font-weight:600;padding:.75rem 1.75rem;border:none;border-radius:8px;cursor:pointer;transition:opacity .2s,transform .1s}.btn-primary:hover{opacity:.88}.btn-primary:active{transform:scale(.98)}.btn-primary:disabled{opacity:.35;cursor:not-allowed}#score-card{display:none;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:2.5rem 2rem;text-align:center}#score-card h2{font-size:1.4rem;margin-bottom:.5rem}.score-number{font-size:3.5rem;font-weight:800;letter-spacing:-.03em;margin:.5rem 0}.score-label{color:var(--muted);font-size:.9rem}.score-breakdown{display:flex;justify-content:center;gap:2.5rem;margin-top:1.5rem;flex-wrap:wrap}.breakdown-item .val{font-size:1.5rem;font-weight:700}.breakdown-item .lbl{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:.2rem}.pass{color:#4ade80}.marginal{color:#fbbf24}.fail{color:#f87171}.correct-val{color:#4ade80}.incorrect-val{color:#f87171}.domain-report{margin-top:1.5rem;text-align:left;border-top:1px solid var(--border);padding-top:1.25rem}.domain-report h3{font-size:.85rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:.75rem}.domain-row{display:flex;align-items:center;gap:.75rem;margin-bottom:.5rem;font-size:.88rem}.domain-row .d-label{flex:1;color:var(--text-muted)}.domain-row .d-score{font-weight:700;min-width:60px;text-align:right}.domain-bar-bg{flex:2;background:var(--surface2);border-radius:999px;height:6px;overflow:hidden}.domain-bar{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--accent),#818cf8)}.domain-bar.weak{background:linear-gradient(90deg,#ef4444,#f87171)}.download-btn{margin-top:1.25rem;display:inline-block;background:var(--surface2);color:var(--text);font-size:.85rem;font-weight:600;padding:.55rem 1.25rem;border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:border-color .15s}.download-btn:hover{border-color:var(--accent)}.btn-restart{margin-top:.75rem;display:inline-block;background:var(--surface2);color:var(--text);font-size:.9rem;font-weight:600;padding:.65rem 1.5rem;border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:border-color .15s}.btn-restart:hover{border-color:var(--accent)}

    <h1>Mock Exam 4</h1>
    <p class="subtitle">10 questions &bull; Security, compliance, and multi-account architecture</p>
  </div>
  <div class="exam-wrap">
    <div class="exam-meta"><span class="q-counter" id="qCounter">Question 1 of 10</span><div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div></div>
    <div class="question-card" id="questionCard">
      <span class="domain-tag" id="qDomainTag"></span>
      <div class="question-header"><span class="question-number" id="qNumber"></span><p class="question-text" id="qText"></p></div>
      <div class="options" id="qOptions"></div>
      <div class="result-badge" id="resultBadge"></div>
    </div>
    <div class="exam-actions">
      <button class="btn-primary" id="submitBtn">Submit Answer</button>
      <button class="btn-primary" id="nextBtn" style="display:none">Next Question &rarr;</button>
      <button class="btn-primary" id="finishBtn" style="display:none">See My Results &rarr;</button>
    </div>
    <div id="score-card">
      <h2>Your Result</h2><div class="score-number" id="scorePercent"></div><div class="score-label" id="scoreLabel"></div>
      <div class="score-breakdown">
        <div class="breakdown-item"><div class="val correct-val" id="countCorrect">0</div><div class="lbl">Correct</div></div>
        <div class="breakdown-item"><div class="val incorrect-val" id="countIncorrect">0</div><div class="lbl">Incorrect</div></div>
        <div class="breakdown-item"><div class="val" id="countUnanswered">0</div><div class="lbl">Skipped</div></div>
      </div>

<script>
const EXAM_NAME="Mock Exam 4";
const QUESTIONS=[
  {id:"q1",domain:1,text:"A company needs to deploy identical baseline infrastructure (VPCs, security groups, IAM roles) across 50 AWS accounts in an Organization. Changes to the baseline must propagate automatically. Which service handles this with least operational overhead?",options:{A:"Create a Lambda function that assumes a role in each account and applies the changes.",B:"CloudFormation StackSets with service-managed permissions — deploy stacks across all accounts in an OU automatically, including newly added accounts.",C:"AWS Config with auto-remediation rules in each account.",D:"Terraform with a master workspace that iterates across accounts."}},
  {id:"q2",domain:2,text:"An application's ALB serves HTTPS traffic. The security team requires TLS 1.2 minimum and must be able to rotate the certificate without downtime. The certificate must be validated automatically. What is the recommended approach?",options:{A:"Upload a self-signed certificate to IAM, reference it on the ALB listener, rotate manually.",B:"Use ACM to provision a public certificate with DNS validation; attach to ALB listener. Rotation is automatic — ACM renews ~60 days before expiry.",C:"Use ACM but with email validation; set a calendar reminder to approve the renewal email.",D:"Store certificate in Secrets Manager; write a Lambda that updates the ALB listener nightly."}},
  {id:"q3",domain:1,text:"An organization wants to prevent any account from disabling AWS Config, while still allowing accounts to create and delete Config rules for their own use. Which SCP satisfies this requirement?",options:{A:"Deny config:* on all accounts.",B:"Deny config:DeleteConfigurationRecorder and config:StopConfigurationRecorder on all accounts in the organization.",C:"Deny config:DeleteConfigRule on all accounts.",D:"Use AWS Config conformance packs instead of SCPs."}},
  {id:"q4",domain:2,text:"A company wants to run containerised microservices. Teams should not manage EC2 instances. Workloads need task-level IAM roles. Auto-scaling must react to custom CloudWatch metrics. Which compute option is correct?",options:{A:"ECS on EC2 launch type — EC2 instances are managed by the team.",B:"ECS on Fargate — serverless containers, supports task-level IAM roles via Task Role, Auto Scaling with custom metrics via Application Auto Scaling.",C:"EC2 with a Dockerfile — manually handle scheduling and scaling.",D:"Lambda with container image support — best for microservices with variable runtime."}},
  {id:"q5",domain:3,text:"A company runs 40 EC2 instances. AWS Compute Optimizer recommends downsizing 15 of them. The team wants to right-size but fears application impact. What is the safest approach?",options:{A:"Immediately resize all 15 instances during the next maintenance window.",B:"Use Compute Optimizer recommendations as a guide; right-size one instance at a time in a staging environment first, then roll out to production with CloudWatch alarms to detect regression.",C:"Ignore recommendations unless Cost Explorer shows >20% waste.",D:"Enable EC2 Auto Scaling and let the service determine the right instance size automatically."}},
  {id:"q6",domain:1,text:"A company uses AWS WAF on CloudFront to block known bad IPs and OWASP Top 10 attacks. They also need to automatically update IP block lists from a threat intelligence feed and enforce the same WAF rules across 30 accounts. What service combination achieves this?",options:{A:"Deploy WAF rules independently in each account using AWS Config.",B:"AWS Firewall Manager with a WAF policy — centrally manage WAF rules across all accounts in an OU; use an IP set that a Lambda updates from the threat feed.",C:"GuardDuty with auto-remediation Lambda to update WAF IP sets per account.",D:"AWS Shield Advanced — includes managed threat intelligence WAF rules."}},
  {id:"q7",domain:4,text:"A company is migrating an on-premises file server (1 PB, NFS) to AWS. The migration window is 2 weeks. After migration, the file server will be decommissioned and all access will be via EFS. What is the most appropriate migration approach?",options:{A:"AWS Snowball Edge to copy data to S3, then S3 to EFS via Lambda.",B:"AWS DataSync agent on-premises → DataSync task → Amazon EFS. Bandwidth can be throttled to avoid impacting production. Re-run the task at cutover for delta sync.",C:"rsync over a VPN connection for the full 1 PB.",D:"AWS Storage Gateway File Gateway as a temporary bridge, migrate data manually."}},
  {id:"q8",domain:2,text:"A financial application requires an Aurora MySQL database that can handle sudden read spikes of 10× normal load without pre-provisioning read replicas. Cost should scale to zero during nights and weekends. What is the correct solution?",options:{A:"Aurora MySQL Multi-Master with 4 write nodes.",B:"Aurora Serverless v2 — scales compute up and down in fine-grained increments (ACUs) in response to load; can scale to minimum ACUs (near zero cost) during quiet periods; read replicas can also be Serverless v2.",C:"RDS MySQL with a read replica — promote the replica during spikes.",D:"Aurora MySQL with 5 pre-provisioned read replicas, stopped at night using AWS Backup."}},
  {id:"q9",domain:3,text:"A company wants to enforce a policy that any S3 bucket storing sensitive data is encrypted with a customer-managed KMS key (not SSE-S3) and has public access blocked. They want automatic detection and remediation, not just alerting. What combination achieves this?",options:{A:"S3 Block Public Access at the account level; manually audit KMS settings monthly.",B:"AWS Config rules (s3-bucket-public-access-prohibited and s3-bucket-server-side-encryption-enabled) with Config auto-remediation SSM Automation documents to fix non-compliant buckets.",C:"GuardDuty S3 protection to detect public buckets and send SNS alerts.",C:"AWS Security Hub with CIS Benchmark standard to detect issues and email the team."}},
  {id:"q10",domain:4,text:"A company wants to standardize backup policies across 200 AWS accounts — daily backups of RDS, EBS, and EFS with a 30-day retention, and cross-region copies to a DR region. Manual setup per account is not scalable. What is the correct approach?",options:{A:"Create a Lambda in each account that calls the AWS Backup API daily.",B:"AWS Backup with Organizations integration — create a backup policy at the OU level. The policy is inherited by all accounts automatically, including new ones.",C:"Enable automated RDS snapshots per account; use EBS lifecycle manager per account.",D:"Use CloudFormation StackSets to deploy a backup Lambda to every account."}}
];
const ANSWERS={
  q1:{correct:"B",explanation:"CloudFormation StackSets with service-managed permissions automatically deploy stacks to new accounts added to an OU — no role management needed. Lambda (A) requires custom code and role scaffolding. Config (C) detects drift but doesn't provision infrastructure. Terraform (D) requires external tooling.",link:"../../domains/01-organizational-complexity/index.html"},
  q2:{correct:"B",explanation:"ACM DNS validation is fully automated — ACM renews certificates and updates the ALB listener with zero downtime. Self-signed certs (A) require manual rotation. Email validation (C) requires human approval. Secrets Manager + Lambda (D) is complex and error-prone.",link:"../../services/security/kms.html"},
  q3:{correct:"B",explanation:"Denying DeleteConfigurationRecorder and StopConfigurationRecorder prevents accounts from disabling the Config recorder while still allowing full management of rules. Denying config:* (A) blocks rule management too. Denying only DeleteConfigRule (C) doesn't prevent disabling recording. Conformance packs (D) detect but don't prevent.",link:"../../domains/01-organizational-complexity/index.html"},
  q4:{correct:"B",explanation:"Fargate eliminates EC2 management. Task Role provides per-task IAM credentials. Application Auto Scaling with a CloudWatch metric target achieves custom-metric scaling. EC2 launch type (A) requires instance management. Lambda (D) has a 15-min timeout, not ideal for long-running microservices.",link:"../../services/compute/ecs-eks.html"},
  q5:{correct:"B",explanation:"Staged right-sizing with monitoring is the safe approach — validates recommendations don't harm the application. Mass resize (A) risks widespread impact. Ignoring recommendations (C) wastes money. Auto Scaling (D) adjusts instance count not instance type.",link:"../../domains/03-migration-modernization/index.html"},
  q6:{correct:"B",explanation:"Firewall Manager centrally manages WAF rules across an OU; an IP set updated by Lambda provides dynamic threat intelligence blocking. Config (A) doesn't manage WAF. GuardDuty (C) detects threats but has no native WAF IP set update. Shield Advanced (D) doesn't provide custom IP blocklists.",link:"../../services/networking/cloudfront.html"},
  q7:{correct:"B",explanation:"DataSync is purpose-built for large-scale NFS migrations with bandwidth throttling, automatic retry, and incremental delta sync at cutover. Snowball + Lambda (A) adds unnecessary complexity for EFS target. rsync (C) is slow and unreliable for 1 PB. Storage Gateway (D) adds a persistent bridge rather than migrating.",link:"../../domains/04-cost-performance/index.html"},
  q8:{correct:"B",explanation:"Aurora Serverless v2 scales ACUs within seconds in fine-grained increments — handles 10× spikes without pre-provisioning. It can pause to minimum ACUs (very low cost) during quiet periods. Multi-Master (A) is for write HA. RDS with replica (C) requires manual promotion. Pre-provisioned replicas (D) can't scale to near-zero.",link:"../../services/databases/aurora.html"},
  q9:{correct:"B",explanation:"Config managed rules detect non-compliance; SSM Automation documents as Config remediation actions can automatically fix buckets (enable encryption, block public access). Account-level Block Public Access (A) doesn't enforce CMK encryption. GuardDuty (C) detects threats, not misconfigurations. Security Hub (D) alerts but doesn't auto-remediate.",link:"../../services/security/kms.html"},
  q10:{correct:"B",explanation:"AWS Backup Organizational Policies allow a central policy at the OU level to enforce backup plans across all member accounts, including new ones. Lambda per account (A) requires individual deployment. Per-account automated snapshots (C) can't enforce cross-region copy centrally. StackSets + Lambda (D) is more complex and can't easily handle new accounts automatically.",link:"../../domains/04-cost-performance/index.html"}
};
const DOMAIN_NAMES={1:"Org Complexity",2:"New Solutions",3:"Continuous Improvement",4:"Migration"};
const DOMAIN_LABELS={1:{label:"Domain 1 \u2014 Org Complexity",cls:"tag-d1"},2:{label:"Domain 2 \u2014 New Solutions",cls:"tag-d2"},3:{label:"Domain 3 \u2014 Continuous Improvement",cls:"tag-d3"},4:{label:"Domain 4 \u2014 Migration",cls:"tag-d4"}};
let current=0,results=[],questionResults=[];
const qCounter=document.getElementById("qCounter"),progressBar=document.getElementById("progressBar"),card=document.getElementById("questionCard"),domainTag=document.getElementById("qDomainTag"),qNumber=document.getElementById("qNumber"),qText=document.getElementById("qText"),qOptions=document.getElementById("qOptions"),resultBadge=document.getElementById("resultBadge"),submitBtn=document.getElementById("submitBtn"),nextBtn=document.getElementById("nextBtn"),finishBtn=document.getElementById("finishBtn"),scoreCard=document.getElementById("score-card");
function renderQuestion(idx){const q=QUESTIONS[idx],d=DOMAIN_LABELS[q.domain];card.className="question-card";domainTag.textContent=d.label;domainTag.className="domain-tag card-tag "+d.cls;qNumber.textContent="Q"+(idx+1);qText.innerHTML=q.text;qCounter.textContent="Question "+(idx+1)+" of "+QUESTIONS.length;progressBar.style.width=(idx/QUESTIONS.length*100)+"%";resultBadge.className="result-badge";resultBadge.innerHTML="";qOptions.innerHTML="";Object.entries(q.options).forEach(([val,text])=>{const label=document.createElement("label");label.className="option";label.innerHTML=`<input type="radio" name="answer" value="${val}"/><span class="option-label"><strong>${val}.</strong> ${text}</span>`;qOptions.appendChild(label);});submitBtn.style.display="inline-block";submitBtn.disabled=false;nextBtn.style.display="none";finishBtn.style.display="none";document.querySelector(".exam-wrap").scrollIntoView({behavior:"smooth",block:"start"});}
function showFeedback(){const selected=document.querySelector('input[name="answer"]:checked');const q=QUESTIONS[current],data=ANSWERS[q.id];document.querySelectorAll('input[name="answer"]').forEach(r=>r.disabled=true);document.querySelectorAll('input[name="answer"]').forEach(radio=>{if(radio.value===data.correct)radio.closest(".option").classList.add("show-correct");});let outcome;if(!selected){outcome="skipped";card.classList.add("state-incorrect");resultBadge.className="result-badge incorrect-msg";resultBadge.innerHTML=`&#9888; Skipped. Correct: <strong>${data.correct}</strong>. ${data.explanation} <a href="${data.link}">Review &rarr;</a>`;}else if(selected.value===data.correct){outcome="correct";card.classList.add("state-correct");resultBadge.className="result-badge correct-msg";resultBadge.innerHTML=`&#10003; Correct! ${data.explanation}`;}else{outcome="incorrect";card.classList.add("state-incorrect");selected.closest(".option").classList.add("show-wrong");resultBadge.className="result-badge incorrect-msg";resultBadge.innerHTML=`&#10007; You chose <strong>${selected.value}</strong>; correct: <strong>${data.correct}</strong>. ${data.explanation} <a href="${data.link}">Review &rarr;</a>`;}results.push(outcome);questionResults.push({q:q.id,domain:q.domain,outcome,chosen:selected?selected.value:null,correct:data.correct});submitBtn.style.display="none";if(current<QUESTIONS.length-1)nextBtn.style.display="inline-block";else finishBtn.style.display="inline-block";}
function showScore(){const correct=results.filter(r=>r==="correct").length,incorrect=results.filter(r=>r==="incorrect").length,skipped=results.filter(r=>r==="skipped").length,pct=Math.round(correct/QUESTIONS.length*100);document.getElementById("countCorrect").textContent=correct;document.getElementById("countIncorrect").textContent=incorrect;document.getElementById("countUnanswered").textContent=skipped;const scoreEl=document.getElementById("scorePercent"),labelEl=document.getElementById("scoreLabel");scoreEl.textContent=pct+"%";if(pct>=75){scoreEl.className="score-number pass";labelEl.textContent="Pass — great work!";}else if(pct>=60){scoreEl.className="score-number marginal";labelEl.textContent="Close — review weak domains.";}else{scoreEl.className="score-number fail";labelEl.textContent="Keep studying.";}const domainStats={};[1,2,3,4].forEach(d=>{domainStats[d]={correct:0,total:0};});questionResults.forEach(r=>{domainStats[r.domain].total++;if(r.outcome==="correct")domainStats[r.domain].correct++;});const breakdownEl=document.getElementById("domainBreakdown");breakdownEl.innerHTML="";[1,2,3,4].forEach(d=>{const s=domainStats[d];if(!s.total)return;const pctD=Math.round(s.correct/s.total*100),weak=pctD<60;const row=document.createElement("div");row.className="domain-row";row.innerHTML=`<span class="d-label">${DOMAIN_NAMES[d]}</span><div class="domain-bar-bg"><div class="domain-bar${weak?" weak":""}" style="width:${pctD}%"></div></div><span class="d-score" style="color:${weak?"#f87171":"#4ade80"}">${s.correct}/${s.total} (${pctD}%)</span>`;breakdownEl.appendChild(row);});progressBar.style.width="100%";scoreCard.style.display="block";scoreCard.scrollIntoView({behavior:"smooth",block:"start"});}
document.getElementById("downloadBtn").addEventListener("click",()=>{const domainStats={};[1,2,3,4].forEach(d=>{domainStats[d]={name:DOMAIN_NAMES[d],correct:0,total:0,weakQuestions:[]};});questionResults.forEach(r=>{domainStats[r.domain].total++;if(r.outcome==="correct")domainStats[r.domain].correct++;else domainStats[r.domain].weakQuestions.push(r.q);});const weakAreas=Object.entries(domainStats).filter(([,s])=>s.total>0&&Math.round(s.correct/s.total*100)<60).map(([,s])=>s.name);const report={exam:EXAM_NAME,date:new Date().toISOString().split("T")[0],score:Math.round(questionResults.filter(r=>r.outcome==="correct").length/QUESTIONS.length*100),domains:domainStats,weakAreas};const blob=new Blob([JSON.stringify(report,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`${EXAM_NAME.replace(/ /g,"-").toLowerCase()}-results-${report.date}.json`;a.click();});
submitBtn.addEventListener("click",showFeedback);nextBtn.addEventListener("click",()=>{current++;renderQuestion(current);});finishBtn.addEventListener("click",()=>{finishBtn.style.display="none";showScore();});document.getElementById("restartBtn").addEventListener("click",()=>{current=0;results=[];questionResults=[];scoreCard.style.display="none";finishBtn.style.display="none";renderQuestion(0);});
renderQuestion(0);
</script>
